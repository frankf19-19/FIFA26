<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歐陸足球 每日預測 · 冠軍之夜</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='35%25'%3E%3Cstop offset='0%25' stop-color='%231d2b52'/%3E%3Cstop offset='100%25' stop-color='%230a0e1c'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ccircle cx='32' cy='30' r='14' fill='none' stroke='%23d9b968' stroke-width='2'/%3E%3Cpath d='M32 22 l2.4 5 5.4.6-4 3.7 1.1 5.3-4.9-2.7-4.9 2.7 1.1-5.3-4-3.7 5.4-.6z' fill='%23d9b968'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;500;600;700;800&family=Chivo+Mono:wght@450;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ============ 冠軍之夜:午夜玻璃 × 香檳金 ============ */
  :root{ /* 冠軍夜(預設;navy=移除 data-theme) */
    --bg0:#0a0e1c; --bg1:#141c36; --glowA:rgba(72,102,190,.20); --glowB:rgba(217,185,104,.10);
    --field:#0a0e1c;
    --panel:rgba(255,255,255,.045); --panel-2:rgba(255,255,255,.085);
    --line:rgba(255,255,255,.13); --gold:#d9b968; --gold2:#f0d79a;
    --chalk:#eef0f6; --muted:#8d96ad; --ink2:#c7cddc;
    --wash:rgba(255,255,255,.05); --wash2:rgba(255,255,255,.12); --btn-ink:#141323;
    --amber:#d9b968; --teal:#7fb3e8; --hit:#66c98c; --miss:#e77d76;
    --home:#66c98c; --draw:#d9b968; --awy:#e77d76;
    --mono:'Chivo Mono',ui-monospace,monospace;
    --cond:'Outfit','Noto Sans TC',sans-serif; --body:'Noto Sans TC',sans-serif;
    --blur:blur(16px); --shadow:0 12px 34px rgba(0,0,0,.38);
  }
  body[data-theme="light"]{ /* 象牙晨光 */
    --bg0:#f4f1ea; --bg1:#faf8f2; --glowA:rgba(217,185,104,.16); --glowB:rgba(120,140,200,.08);
    --field:#f4f1ea;
    --panel:rgba(255,255,255,.82); --panel-2:rgba(247,243,233,.9);
    --line:rgba(60,50,30,.14); --gold:#9a7a2e; --gold2:#c5a24e;
    --chalk:#241f14; --muted:#83795f; --ink2:#4c4330;
    --wash:rgba(60,50,30,.045); --wash2:rgba(60,50,30,.1); --btn-ink:#241f14;
    --amber:#9a7a2e; --teal:#2b6ea8; --hit:#247a48; --miss:#c2453b;
    --home:#247a48; --draw:#9a7a2e; --awy:#c2453b;
    --shadow:0 10px 26px rgba(60,50,30,.10);
  }
  body[data-theme="cream"]{ /* 香檳 */
    --bg0:#efe6d4; --bg1:#f7f0e1; --glowA:rgba(197,162,78,.22); --glowB:rgba(255,255,255,.3);
    --field:#efe6d4;
    --panel:rgba(255,252,244,.85); --panel-2:rgba(243,234,214,.92);
    --line:rgba(92,72,32,.16); --gold:#8f6c1e; --gold2:#b8923a;
    --chalk:#2e2410; --muted:#8b7c58; --ink2:#57482a;
    --wash:rgba(92,72,32,.05); --wash2:rgba(92,72,32,.11); --btn-ink:#2e2410;
    --amber:#8f6c1e; --teal:#2b6ea8; --hit:#247a48; --miss:#c2453b;
    --home:#247a48; --draw:#8f6c1e; --awy:#c2453b;
    --shadow:0 10px 26px rgba(92,72,32,.12);
  }
  body[data-theme="sky"]{ /* 皇家藍 */
    --bg0:#0d1b3d; --bg1:#16295c; --glowA:rgba(96,140,255,.26); --glowB:rgba(217,185,104,.12);
    --field:#0d1b3d;
    --panel:rgba(255,255,255,.055); --panel-2:rgba(255,255,255,.1);
    --line:rgba(255,255,255,.15); --gold:#e2c169; --gold2:#f4e0a2;
    --chalk:#f0f3fa; --muted:#93a1c4; --ink2:#ccd5ea;
    --wash:rgba(255,255,255,.05); --wash2:rgba(255,255,255,.13); --btn-ink:#101b3a;
    --amber:#e2c169; --teal:#8fc1ff; --hit:#6fd096; --miss:#ef867f;
    --home:#6fd096; --draw:#e2c169; --awy:#ef867f;
    --shadow:0 12px 34px rgba(0,0,0,.4);
  }
  body[data-theme="mint"]{ /* 翡翠夜 */
    --bg0:#081511; --bg1:#0f241d; --glowA:rgba(52,160,120,.22); --glowB:rgba(217,185,104,.1);
    --field:#081511;
    --panel:rgba(255,255,255,.05); --panel-2:rgba(255,255,255,.095);
    --line:rgba(255,255,255,.14); --gold:#d9b968; --gold2:#f0d79a;
    --chalk:#ecf3ef; --muted:#89a396; --ink2:#c6d6cd;
    --wash:rgba(255,255,255,.05); --wash2:rgba(255,255,255,.12); --btn-ink:#0c1a15;
    --amber:#d9b968; --teal:#7fd0b2; --hit:#66c98c; --miss:#e77d76;
    --home:#66c98c; --draw:#d9b968; --awy:#e77d76;
    --shadow:0 12px 34px rgba(0,0,0,.4);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(900px 480px at 18% -6%, var(--glowA), transparent 62%),
      radial-gradient(760px 420px at 86% 2%, var(--glowB), transparent 60%),
      linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 46%);
    background-attachment:fixed;
    color:var(--chalk);font-family:var(--body);line-height:1.7;min-height:100vh;
    padding:clamp(16px,3.5vw,40px) clamp(13px,4vw,30px) 80px;
  }
  .wrap{max-width:900px;margin:0 auto}
  ::selection{background:var(--gold);color:var(--btn-ink)}
  :focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:8px}

  /* ---------- 金色髮絲線 ---------- */
  .goldline{height:1px;border:none;
    background:linear-gradient(90deg,transparent,var(--gold) 18%,var(--gold2) 50%,var(--gold) 82%,transparent)}

  /* ---------- 刊頭 ---------- */
  header{padding-top:2px}
  .topline{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--muted);margin-bottom:34px}
  .topline .sp{flex:1}
  .buildtag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--gold);
    border:1px solid var(--gold);padding:2px 10px;border-radius:999px;opacity:.9}
  .brand{text-align:center;padding:6px 0 26px;animation:fadeup .8s ease-out both}
  .mast-en{font-family:var(--cond);font-weight:600;font-size:clamp(10px,2vw,12px);
    letter-spacing:.62em;text-indent:.62em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
  .wordmark{font-family:var(--cond);font-weight:200;font-size:clamp(40px,9vw,68px);
    line-height:1.06;letter-spacing:.06em;color:var(--chalk)}
  .wordmark b{font-weight:800;letter-spacing:.02em;
    background:linear-gradient(120deg,var(--gold),var(--gold2) 55%,var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .mast-sub{font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;color:var(--muted);margin-top:15px}
  .mast-sub b{color:var(--ink2);font-weight:600}
  @keyframes fadeup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  /* ---------- 分頁 ---------- */
  .leagues{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;padding:18px 0 6px}
  .lg{font-family:var(--cond);font-weight:600;font-size:14px;letter-spacing:.06em;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);border-radius:999px;
    padding:7px 19px;cursor:pointer;transition:.2s;backdrop-filter:var(--blur)}
  .lg:hover{color:var(--chalk);border-color:var(--gold)}
  .lg.on{color:var(--btn-ink);border-color:transparent;
    background:linear-gradient(120deg,var(--gold),var(--gold2));font-weight:700}
  .lg.th,.lg.nav-p{font-size:11.5px;padding:4px 13px;letter-spacing:.04em}

  /* ---------- 控制列 ---------- */
  .datebar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;justify-content:center;padding:14px 0 6px}
  .nav{font-family:var(--mono);font-size:16px;color:var(--chalk);background:var(--panel);
    border:1px solid var(--line);border-radius:12px;width:38px;height:38px;cursor:pointer;
    transition:.2s;backdrop-filter:var(--blur)}
  .nav:hover{border-color:var(--gold);color:var(--gold)}
  input[type=date]{font-family:var(--mono);font-size:14.5px;color:var(--chalk);background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:8px 13px;cursor:pointer;backdrop-filter:var(--blur)}
  .today-btn{font-family:var(--cond);font-weight:600;font-size:13px;letter-spacing:.08em;color:var(--muted);
    background:none;border:1px solid var(--line);border-radius:999px;padding:8px 17px;cursor:pointer;transition:.2s}
  .today-btn:hover{color:var(--gold);border-color:var(--gold)}
  .btn{font-family:var(--cond);font-weight:700;letter-spacing:.16em;font-size:13px;text-transform:uppercase;
    color:var(--btn-ink);background:linear-gradient(120deg,var(--gold),var(--gold2));
    border:none;border-radius:999px;padding:11px 30px;cursor:pointer;
    display:inline-flex;align-items:center;gap:9px;transition:.2s;
    box-shadow:0 6px 22px rgba(217,185,104,.3)}
  .btn:hover{filter:brightness(1.07);transform:translateY(-1px)}
  .btn:disabled{opacity:.55;cursor:default;transform:none}
  .btn.spin .ico{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ---------- 記分列(超細大數字) ---------- */
  .score-row{display:flex;flex-wrap:wrap;gap:0;align-items:stretch;justify-content:center;
    margin:22px 0 6px;padding:18px 8px;background:var(--panel);border:1px solid var(--line);
    border-radius:20px;backdrop-filter:var(--blur);box-shadow:var(--shadow)}
  .stat{padding:2px 34px;text-align:center;position:relative}
  .stat + .stat::before{content:"";position:absolute;left:0;top:14%;bottom:14%;width:1px;
    background:linear-gradient(180deg,transparent,var(--line),transparent)}
  .stat .num{font-family:var(--cond);font-weight:200;font-size:clamp(34px,8vw,52px);line-height:1;
    background:linear-gradient(150deg,var(--gold2),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .stat .num.small{font-weight:300;font-size:clamp(26px,6vw,40px);background:none;color:var(--chalk)}
  .stat .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.26em;color:var(--muted);margin-top:8px}
  .status{width:100%;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.08em;
    color:var(--muted);padding-top:12px;margin-left:0}
  .status.err{color:var(--miss)}

  /* ---------- 章節標 ---------- */
  section{margin-top:clamp(34px,7vw,52px)}
  .sec-head{display:flex;align-items:center;gap:16px;margin-bottom:18px}
  .sec-head h2{font-family:var(--cond);font-weight:600;font-size:clamp(14px,3.4vw,17px);
    letter-spacing:.34em;text-indent:.34em;text-transform:uppercase;color:var(--chalk);white-space:nowrap}
  .sec-head::after{content:"";flex:1;height:1px;
    background:linear-gradient(90deg,var(--gold),transparent)}
  .sec-head .tag{font-family:var(--mono);font-size:11.5px;color:var(--muted);white-space:nowrap}
  .sec-head .back{font-family:var(--cond);font-weight:600;font-size:13px;letter-spacing:.06em;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 17px;cursor:pointer;transition:.2s}
  .sec-head .back:hover{color:var(--gold);border-color:var(--gold)}

  /* ---------- 玻璃卡通用 ---------- */
  .headline,.game,.sr-item,.player,.lineup-col,.table-wrap,.empty{
    background:var(--panel);border:1px solid var(--line);border-radius:18px;
    backdrop-filter:var(--blur);box-shadow:var(--shadow)}

  /* ---------- 頭條 ---------- */
  .headline{padding:13px 18px;margin-bottom:10px;font-size:14.5px;color:var(--ink2);
    transition:.2s;animation:fadeup .5s ease-out both}
  .headline:hover{border-color:var(--gold);transform:translateY(-2px)}
  .headline .hk{font-family:var(--cond);font-weight:700;font-size:10.5px;letter-spacing:.2em;
    color:var(--gold);margin-right:11px;text-transform:uppercase}

  /* ---------- 賽事卡 ---------- */
  .game{padding:17px clamp(15px,3vw,22px);margin-bottom:14px;transition:.2s;animation:fadeup .5s ease-out both}
  .game:hover{border-color:var(--gold);transform:translateY(-2px)}
  .game.done{background:var(--panel-2)}
  .g-top{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-bottom:13px}
  .g-time{font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;color:var(--muted)}
  .pill{font-family:var(--cond);font-weight:600;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
    padding:3px 12px;border-radius:999px;white-space:nowrap;border:1px solid}
  .pill.hit{color:var(--hit);border-color:var(--hit)}
  .pill.miss{color:var(--miss);border-color:var(--miss)}
  .pill.wait{color:var(--muted);border-color:var(--line)}
  .pill.live{color:var(--miss);border-color:var(--miss)}
  .pill.live .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--miss);
    margin-right:6px;animation:blink 1.2s infinite;box-shadow:0 0 8px var(--miss)}
  @keyframes blink{50%{opacity:.25}}
  .detail-btn{margin-left:auto;font-family:var(--cond);font-weight:600;font-size:12px;letter-spacing:.08em;
    color:var(--gold);background:none;border:1px solid var(--line);border-radius:999px;
    padding:4px 15px;cursor:pointer;transition:.2s}
  .detail-btn:hover{border-color:var(--gold)}
  .teams{display:flex;flex-direction:column;gap:10px}
  .team{display:flex;align-items:center;gap:12px}
  .team img{width:28px;height:28px;object-fit:contain;flex:0 0 28px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.3))}
  .team .nm{font-weight:500;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    cursor:pointer;transition:.15s}
  .team .nm:hover{color:var(--gold)}
  .team .sc{font-family:var(--cond);font-weight:200;margin-left:auto;font-size:34px;color:var(--muted);line-height:1}
  .team.win .nm{font-weight:700;color:var(--chalk)}
  .team.win .sc{font-weight:600;
    background:linear-gradient(150deg,var(--gold2),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent}

  .prob{margin-top:15px}
  .prob-bar{height:6px;border-radius:3px;overflow:hidden;background:var(--wash2);display:flex}
  .prob-bar .h{background:var(--home)} .prob-bar .d{background:var(--draw)} .prob-bar .a{background:var(--awy)}
  .prob-lbl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;
    letter-spacing:.05em;color:var(--muted);margin-top:7px}
  .prob-lbl b{color:var(--chalk);font-weight:600}
  .predline{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:13px;color:var(--ink2);align-items:center}
  .predline .k{font-family:var(--cond);font-weight:700;font-size:10px;letter-spacing:.24em;color:var(--muted);text-transform:uppercase}
  .predline b{color:var(--teal);font-family:var(--mono)}
  .predline .pick{color:var(--gold);font-weight:700}
  .why,.review{margin-top:13px;padding-top:12px;font-size:13.5px;color:var(--ink2);
    border-top:1px solid var(--line)}
  .why .k,.review .k{font-family:var(--cond);font-weight:700;font-size:10px;letter-spacing:.24em;
    margin-right:10px;text-transform:uppercase}
  .why .k{color:var(--teal)}
  .review{border-top:none;border-left:2px solid var(--line);padding:8px 0 2px 14px}
  .review.good{border-left-color:var(--hit)} .review.bad{border-left-color:var(--miss)}
  .review.good .k{color:var(--hit)} .review.bad .k{color:var(--miss)}

  /* ---------- 積分榜 ---------- */
  .table-wrap{overflow-x:auto}
  table.stand{border-collapse:collapse;width:100%;min-width:520px;font-size:13px}
  table.stand th{font-family:var(--cond);font-weight:600;font-size:10.5px;letter-spacing:.18em;color:var(--muted);
    text-align:right;padding:13px 11px;border-bottom:1px solid var(--gold);white-space:nowrap;text-transform:uppercase;opacity:.9}
  table.stand th:nth-child(2){text-align:left}
  table.stand td{font-family:var(--mono);text-align:right;padding:10px 11px;border-bottom:1px solid var(--line);
    white-space:nowrap;color:var(--ink2)}
  table.stand tr:last-child td{border-bottom:none}
  table.stand td:nth-child(2){text-align:left;font-family:var(--body);cursor:pointer;font-weight:500;transition:.15s}
  table.stand td:nth-child(2):hover{color:var(--gold)}
  table.stand td img{width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:9px}
  table.stand tr td:last-child{font-family:var(--cond);font-weight:600;font-size:14.5px;
    background:linear-gradient(150deg,var(--gold2),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  table.stand tr.ucl td:first-child{box-shadow:inset 3px 0 var(--home)}
  table.stand tr.rel td:first-child{box-shadow:inset 3px 0 var(--miss)}

  /* ---------- 搜尋 ---------- */
  .searchbar{display:flex;gap:8px;position:relative;margin-top:26px;margin-bottom:13px}
  .searchbar input{flex:1;font-family:var(--body);font-size:15px;color:var(--chalk);background:var(--panel);
    border:1px solid var(--line);border-radius:999px;padding:12px 22px;outline:none;
    backdrop-filter:var(--blur);box-shadow:var(--shadow);transition:.2s}
  .searchbar input::placeholder{color:var(--muted)}
  .searchbar input:focus{border-color:var(--gold)}
  .search-results{margin-bottom:8px}
  .filterbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:2px 0}
  .fchip{font-family:var(--cond);font-weight:600;font-size:12.5px;letter-spacing:.05em;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 15px;
    cursor:pointer;transition:.2s;backdrop-filter:var(--blur)}
  .fchip:hover{color:var(--chalk);border-color:var(--gold)}
  .fchip.on{color:var(--btn-ink);background:linear-gradient(120deg,var(--gold),var(--gold2));border-color:transparent;font-weight:700}
  .fdiv{width:1px;height:20px;background:var(--line);margin:0 4px}
  .sr-item{display:flex;align-items:center;gap:12px;padding:10px 15px;margin-bottom:8px;cursor:pointer;
    font-size:14px;transition:.2s;border-radius:15px}
  .sr-item:hover{border-color:var(--gold);transform:translateY(-1px)}
  .sr-item img{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--panel-2);border:1px solid var(--line)}
  .sr-item .pos{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--gold);
    border:1px solid var(--gold);padding:1px 9px;border-radius:999px;opacity:.9}
  .sr-item .tm{margin-left:auto;font-size:12px;color:var(--muted)}

  /* ---------- 球隊/球員 ---------- */
  .pos-group{font-family:var(--cond);font-weight:600;font-size:12px;letter-spacing:.3em;color:var(--gold);
    margin:24px 0 11px;text-transform:uppercase;display:flex;align-items:center;gap:14px}
  .pos-group::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .player{padding:12px 17px;margin-bottom:9px;display:flex;gap:14px;align-items:center;transition:.2s;border-radius:16px}
  .player:hover{border-color:var(--gold);transform:translateY(-1px)}
  .avatar{width:50px;height:50px;border-radius:50%;flex:0 0 50px;background:var(--panel-2);
    border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;
    font-family:var(--cond);font-weight:600;font-size:18px;color:var(--gold)}
  .p-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .p-top .pnm{font-weight:700;font-size:15.5px}
  .p-top .pmeta{font-family:var(--mono);font-size:11.5px;color:var(--muted)}
  .badge{font-family:var(--cond);font-weight:600;font-size:11px;letter-spacing:.1em;padding:2px 11px;border-radius:999px}
  .badge.star{color:var(--gold);border:1px solid var(--gold)}
  .p-note{font-size:13px;color:var(--ink2);margin-top:3px}

  /* ---------- 詳情 ---------- */

/* ================= 工具 ================= */
function avFallback(img){

function norm(s){return (s||"").toLowerCase().replace(/[^a-z\s]/g,"").replace(/\s+/g," ").trim();}
/* ---- 評級自我校準:依賽果微調,存在瀏覽器(euroADJ),越用越準 ---- */
let inMemAdj={};
function adjGet(){try{const v=localStorage.getItem("euroADJ");return v?JSON.parse(v):{};}catch(e){return inMemAdj;}}
function adjSet(o){inMemAdj=o;try{localStorage.setItem("euroADJ",JSON.stringify(o));}catch(e){}}
let ADJ_CACHE=adjGet();
function baseRating(name){
  const n=norm(name);
  if(RATINGS[n]!==undefined) return RATINGS[n];
  for(const k in RATINGS){ if(n.includes(k)||k.includes(n)) return RATINGS[k]; }
  return 68;
}
function rating(name){
  const d=ADJ_CACHE[norm(name)]||0;
  return baseRating(name)+Math.max(-8,Math.min(8,d));   // 校準值上限 ±8
}
function zhName(name){
  const n=norm(name);
  if(ZH[n]) return ZH[n];
  for(const k in ZH){ if(n.includes(k)||k.includes(n)) return ZH[k]; }
  return name;
}

/* ================= Poisson 預測 ================= */
function poisson(k,l){let e=Math.exp(-l),f=1;for(let i=2;i<=k;i++)f*=i;return e*Math.pow(l,k)/f;}
function predict(homeName,awayName){
  const rh=rating(homeName), ra=rating(awayName), d=rh-ra;
  const COEF=0.030, BASE=1.32, HA=0.24;         // 主場優勢固定(聯賽有真實主客場)
  let lh=BASE*Math.exp(COEF*d/2 + HA/2), la=BASE*Math.exp(-COEF*d/2 - HA/2);
  lh*=injAdj(homeName); la*=injAdj(awayName);   // 傷兵折扣:主力缺陣自動下修預期進球
  lh=Math.max(0.2,Math.min(lh,4.2)); la=Math.max(0.2,Math.min(la,4.2));
  let H=0,D=0,A=0;
  for(let i=0;i<8;i++)for(let j=0;j<8;j++){const p=poisson(i,lh)*poisson(j,la);
    if(i>j)H+=p;else if(i===j)D+=p;else A+=p;}
  const t=H+D+A; H=H/t*100;D=D/t*100;A=A/t*100;
  let si=Math.round(lh), sj=Math.round(la);
  if(la<0.75)sj=0; if(lh<0.75)si=0;
  if(H>=A&&si<=sj)si=sj+1; else if(A>H&&sj<=si)sj=si+1;
  if(Math.abs(H-A)<6){si=sj=Math.max(1,Math.round((lh+la)/2));}
  const conf = Math.max(H,D,A)>=55?"高":Math.max(H,D,A)>=42?"中":"低";
  const pick = H>=A ? homeName : awayName;
  return {H:+H.toFixed(1),D:+D.toFixed(1),A:+A.toFixed(1),si,sj,conf,pick};
}
function reasonText(hn,an,p){
  const hz=zhName(hn),az=zhName(an),gap=Math.abs(p.H-p.A);
  const fav=p.H>=p.A?hz:az, fp=Math.max(p.H,p.A);
  let s;
  if(gap>=28) s=`${fav}實力明顯領先(${fp}%),主客與陣容深度佔優。`;
  else if(gap>=12) s=`${fav}略占上風(${fp}%),但對手有一定抵抗力。`;
  else s=`勢均力敵,${fav}僅微幅領先(${fp}%),和局機率也有 ${p.D}%。`;
  return `（模型預測）${s}預期比分 ${p.si}-${p.sj}。實際仍需視當日先發、傷停與狀態調整。`;
}

/* ================= ESPN 資料 ================= */
async function jget(url){const r=await fetch(url);if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}
function espnScore(league,date){return `https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/scoreboard?dates=${date}`;}
function espnInjuries(league){return `https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/injuries`;}
let INJURIES={};        // norm(team) -> [{name,status,out}]
let INJ_BY_PLAYER={};   // norm(player) -> status
let INJ_LOADED_AT="";
async function loadInjuries(){
  const map={}, byP={};
  let teams=0, players=0;
  for(const lg of LEAGUES){
    try{
      const d=await jget(espnInjuries(lg.id));
      (d.injuries||[]).forEach(t=>{
        const tn=norm((t.team&&(t.team.displayName||t.team.name))||""); if(!tn) return;
        const lst=(t.injuries||[]).map(it=>{
          const a=it.athlete||{}; const nm=a.displayName||a.shortName||"";
          const st=it.status||((it.type||{}).description)||"";
          const out=/out|suspend|red/i.test(st);
          if(nm) byP[norm(nm)]=st;
          return {name:nm,status:st,out};
        }).filter(x=>x.name);
        if(lst.length){ map[tn]=(map[tn]||[]).concat(lst); teams++; players+=lst.length; }
      });
    }catch(e){}
  }
  INJURIES=map; INJ_BY_PLAYER=byP;
  INJ_LOADED_AT=new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false});
  const el=document.getElementById("injInfo");
  if(el) el.textContent = players? `🚑 傷兵情報:${teams} 隊 ${players} 人(ESPN,${INJ_LOADED_AT} 更新,已納入預測)`
    : `🚑 傷兵情報:ESPN 目前未提供(不影響其他功能)`;
}
function injAdj(teamName){
  const lst=INJURIES[norm(teamName)]; if(!lst) return 1.0;
  const outs=lst.filter(x=>x.out).length, doubts=lst.length-outs;
  return Math.max(0.85, 1 - 0.035*Math.min(outs,4) - 0.012*Math.min(doubts,4));
}
function espnNews(league){return `https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/news`;}

async function loadNews(){
  const items=[];

      const t=(a.headline||a.title||"").trim(); if(!t) return;
      let link=""; try{link=a.links.web.href;}catch(e){ if(Array.isArray(a.links)&&a.links[0]) link=a.links[0].href||""; }
      items.push({t,link,d:(a.published||"").slice(0,10)});
    });
  }catch(e){}
  REAL_NEWS=items;
}

  `https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/teams/${teamId}/roster`,
  `https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/teams/${teamId}?enable=roster`,
  `https://site.web.api.espn.com/apis/site/v2/sports/soccer/${league}/teams/${teamId}/roster`,
];}
function parseRosterPayload(rd){
  // 可能結構:rd.athletes[](分組) / rd.team.athletes[] / rd.roster.entries[]
  const flat=[];
  const push=a=>{ if(a&&(a.fullName||a.displayName)) flat.push(a); };
  const groups = rd.athletes || (rd.team&&rd.team.athletes) || (rd.roster&&(rd.roster.entries||rd.roster.athletes)) || [];
  (Array.isArray(groups)?groups:[groups]).forEach(g=>{
    if(!g) return;
    if(g.items||g.athletes){ (g.items||g.athletes).forEach(x=>push(x.athlete||x)); }
    else push(g.athlete||g);
  });
  return flat;
}
async function fetchTeamRoster(league,teamId){
  let lastErr=null;
  for(const u of espnRosterUrls(league,teamId)){
    try{ const rd=await jget(u); const flat=parseRosterPayload(rd); if(flat.length) return flat; }
    catch(e){ lastErr=e; }
  }
  if(lastErr) throw lastErr;
  return [];
}
function espnHeadshot(id){return id?`https://a.espncdn.com/i/headshots/soccer/players/full/${id}.png`:"";}
function athleteToIdx(a,teamName,league){
  return { id:a.id, name:a.fullName||a.displayName,
    pos:(a.position&&(a.position.abbreviation||a.position.name))||"",
    num:a.jersey||"", teamName,
    headshot:(a.headshot&&(a.headshot.href||a.headshot))||espnHeadshot(a.id),
    age:a.age||"", nat:(a.citizenship)||(a.birthPlace&&a.birthPlace.country)||"",
    h:a.displayHeight||"", w:a.displayWeight||"", birth:(a.dateOfBirth||"").slice(0,10),
    league };
}
let TEAM_LIST={};   // league -> [{id,displayName}]
async function getTeamList(league){
  if(TEAM_LIST[league]) return TEAM_LIST[league];
  // 路徑1:teams 端點(兩個網域)
  for(const u of [espnTeams(league), `https://site.web.api.espn.com/apis/site/v2/sports/soccer/${league}/teams`]){
    try{
      const td=await jget(u);
      let teams=[]; try{teams=td.sports[0].leagues[0].teams.map(t=>t.team);}catch(e){teams=(td.teams||[]).map(t=>t.team||t);}
      teams=teams.filter(t=>t&&t.id);
      if(teams.length){TEAM_LIST[league]=teams;return teams;}
    }catch(e){}
  }
  // 路徑2:從積分榜萃取(此端點已證實可通)
  try{
    const sd=await jget(espnStand(league));
    const teams=[];
    (sd.children||[sd]).forEach(gr=>(((gr.standings&&gr.standings.entries)||gr.entries)||[]).forEach(e=>{
      const t=e.team||{}; if(t.id&&(t.displayName||t.name)) teams.push({id:t.id,displayName:t.displayName||t.name,logos:t.logos});
    }));
    if(teams.length){TEAM_LIST[league]=teams;return teams;}
  }catch(e){}
  // 路徑3:從近兩天賽程萃取(至少涵蓋有比賽的球隊)
  try{
    const d0=new Date(); const d1=new Date(); d1.setDate(d1.getDate()-1);
    const sb=await jget(espnScore(league, ymd(d1)+"-"+ymd(d0)));
    const seen={}; const teams=[];
    (sb.events||[]).forEach(ev=>{const c=(ev.competitions||[])[0];((c&&c.competitors)||[]).forEach(x=>{
      const t=x.team||{}; if(t.id&&!seen[t.id]){seen[t.id]=1;teams.push({id:t.id,displayName:t.displayName});}});});
    if(teams.length){TEAM_LIST[league]=teams;return teams;}
  }catch(e){}
  throw new Error("無法取得球隊清單(teams/積分榜/賽程皆無回應)");
}

/* 位置英文縮寫 → 中文大類(全域共用) */
function posToZh(pos){
  const p=(pos||"").toLowerCase();
  if(p.includes("goal")||p==="g"||p==="gk")return"門將";
  if(p.includes("back")||p==="d"||p.includes("defen")||p.includes("full")||p.includes("centre-b"))return"後衛";
  if(p.includes("mid")||p==="m")return"中場";
  if(p.includes("forward")||p.includes("striker")||p.includes("wing")||p==="f"||p==="st"||p==="cf")return"前鋒";
  return"其他";
}

async function buildPlayerIndex(league){
  if(indexedLeague===league || indexLoading) return;
  indexLoading = true;
  const si = document.getElementById("searchInfo");
  if(si) si.textContent = "載入球員名冊中…";
  try{
    const teams = await getTeamList(league);
    const idx = [];
    const chunks = [];
    for(let i=0;i<teams.length;i+=4) chunks.push(teams.slice(i,i+4));
    let fail=0;
    for(const chunk of chunks){
      await Promise.all(chunk.map(async t=>{
        try{
          const flat = await fetchTeamRoster(league, t.id);
          flat.forEach(a=>idx.push(athleteToIdx(a, t.displayName, league)));
        }catch(e){ fail++; }
      }));
      if(si) si.textContent = `載入球員名冊中… ${idx.length} 名`;
    }
    PLAYER_INDEX = idx;
    indexedLeague = league;
    if(si) si.textContent = idx.length?`可搜尋 ${idx.length} 名球員${fail?`(${fail} 隊載入失敗)`:""}`
      :`名冊端點無資料(${fail} 隊失敗)— 點球隊仍可即時載入該隊名冊`;
  }catch(e){
    if(si) si.innerHTML = `名冊載入失敗:${e.message} · <a href="#" id="idxRetry" style="color:var(--teal)">重試</a>`;
    const r=document.getElementById("idxRetry");
    if(r) r.onclick=(ev)=>{ev.preventDefault();indexedLeague=null;indexLoading=false;buildPlayerIndex(league);};
  }
  indexLoading = false;
}

let allBuilding=false;
async function buildAllLeaguesIndex(){
  if(allIndexLoaded||allBuilding) return;
  allBuilding=true;
  const si=document.getElementById("searchInfo");
  const merged=[]; const seen=new Set();
  for(const lg of LEAGUES){
    if(si) si.textContent=`載入 ${lg.zh} 名冊中…`;

      const teams=await getTeamList(lg.id);
      const chunks=[]; for(let i=0;i<teams.length;i+=4) chunks.push(teams.slice(i,i+4));
      for(const chunk of chunks){
        await Promise.all(chunk.map(async t=>{
          try{
            const flat=await fetchTeamRoster(lg.id,t.id);
            flat.forEach(a=>{
              const key=(a.fullName||a.displayName)+"|"+t.displayName; if(seen.has(key))return; seen.add(key);
              merged.push(athleteToIdx(a,t.displayName,lg.id));
            });
          }catch(e){}
        }));
      }
    }catch(e){}

  if(si) si.textContent=`可搜尋全部 ${merged.length} 名球員(六聯賽)· 名冊 ${t} 自動更新`;
}

/* 由真實資料生成球員介紹(誠實原則:有什麼寫什麼,不編造) */
function playerIntroText(p,flat){
  const parts=[];
  const zhPos=posToZh(p.pos);
  parts.push(`${p.name} 是 ${zhName(p.teamName)} 的${zhPos}${p.num?`(背號 ${p.num})`:""}`);
  if(p.age||p.nat){ parts.push(`${p.nat?p.nat+"籍,":""}${p.age?`現年 ${p.age} 歲`:""}`.replace(/,$/,"")); }
  if(p.h||p.w){ parts.push(`${p.h||""}${p.h&&p.w?" / ":""}${p.w||""}`); }
  if(flat){
    const g=flat.goals??flat.totalGoals, a=flat.goalAssists??flat.assists, ap=flat.appearances;
    const sv=flat.saves, yc=flat.yellowCards;
    const bits=[];
    if(ap!=null) bits.push(`出場 ${ap} 次`);
    if(zhPos==="門將"&&sv!=null) bits.push(`撲救 ${sv} 次`);
    if(g!=null&&+g>0) bits.push(`攻入 ${g} 球`);
    if(a!=null&&+a>0) bits.push(`送出 ${a} 助攻`);
    if(bits.length) parts.push(`本季${bits.join("、")}`);
    if(g!=null&&+g>=10) parts.push(`是球隊的主要得分點`);
    else if(a!=null&&+a>=8) parts.push(`是進攻的重要串聯者`);
  }
  return parts.filter(Boolean).join(",")+"。資料來源:ESPN,介紹由數據自動生成。";
}
async function fetchPlayerStats(league, id){
  if(!id) return null;
  const tryUrls = [
    `https://site.web.api.espn.com/apis/common/v3/sports/soccer/${league}/athletes/${id}/overview`,
    `https://site.api.espn.com/apis/common/v3/sports/soccer/${league}/athletes/${id}/stats`,
  ];
  for(const u of tryUrls){
    try{
      const d = await jget(u);
      const flat = {};
      (function walk(o){
        if(!o||typeof o!=="object") return;
        if(Array.isArray(o)){ o.forEach(walk); return; }
        const key = o.name || o.abbreviation;
        const dv = o.displayValue!=null?o.displayValue:(o.value!=null?o.value:null);
        if(key && dv!=null && (typeof dv==="string"||typeof dv==="number")) { if(flat[key]==null) flat[key]=dv; }
        for(const k in o) walk(o[k]);
      })(d);
      if(Object.keys(flat).length) return flat;
    }catch(e){}
  }
  return null;
}

function parseEvents(data){
  const out=[];
  (data.events||[]).forEach(ev=>{
    const c=(ev.competitions||[])[0]; if(!c)return;
    const cs=c.competitors||[];
    const home=cs.find(x=>x.homeAway==="home"), away=cs.find(x=>x.homeAway==="away");
    if(!home||!away)return;
    const st=(c.status||ev.status||{}).type||{};
    out.push({
      id:ev.id, localIso: isoDate(new Date(ev.date)),
      hn:home.team.displayName, an:away.team.displayName,
      hlogo:home.team.logo||"", alogo:away.team.logo||"",
      hs:home.score!=null?parseInt(home.score):null, as:away.score!=null?parseInt(away.score):null,
      state:st.state||"pre",             // pre / in / post
      completed:!!st.completed,
      time:new Date(ev.date).toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false}),
      detail:st.shortDetail||"",
    });
  });
  return out;
}

/* ================= 記分卡(localStorage,含防呆) ================= */
function scGet(){
  try{const v=localStorage.getItem("euroSC");return v?JSON.parse(v):{};}catch(e){return inMemScorecard;}
}
function scSet(o){
  inMemScorecard=o;
  try{localStorage.setItem("euroSC",JSON.stringify(o));}catch(e){}
}
function gradeFinished(games){
  const sc=scGet(); let changed=false;
  games.forEach(g=>{
    if(!g.completed||g.hs==null||g.as==null)return;
    const ex=sc[g.id];
    if(ex&&ex.pred)return;                      // 新格式已完整 → 跳過
    // ex 存在但無快照 = e12 前的舊記錄 → 升級:補快照與檢討所需欄位(保留原本的命中/Brier,誠實不竄改)
    const p=predict(g.hn,g.an);
    const realOut = g.hs>g.as?"H":g.hs<g.as?"A":"D";
    const predOut = p.H>=p.D&&p.H>=p.A?"H":p.A>=p.D&&p.A>=p.H?"A":"D";
    const y={H:0,D:0,A:0}; y[realOut]=1;
    const brier=(p.H/100-y.H)**2+(p.D/100-y.D)**2+(p.A/100-y.A)**2;
    sc[g.id]={hit:ex?ex.hit:(predOut===realOut),
      brier:ex?ex.brier:+brier.toFixed(3),
      score:ex?ex.score:(predOut===realOut&&p.si===g.hs&&p.sj===g.as),
      hs:g.hs, as:g.as, hz:zhName(g.hn), az:zhName(g.an),
      homePick:p.pick===g.hn, draw:g.hs===g.as, cal:!!(ex&&ex.cal),
      pred:{H:p.H,D:p.D,A:p.A,si:p.si,sj:p.sj,conf:p.conf,pick:p.pick}};
    // --- 評級自我校準:淨勝球誤差 → 微調兩隊評級(此消彼長,單場上限 ±2;每場只做一次) ---
    if(!sc[g.id].cal){
      const err=(g.hs-g.as)-(p.si-p.sj);
      const delta=Math.max(-2,Math.min(2, 1.6*Math.tanh(err/2)));
      if(Math.abs(delta)>0.05){
        const hn=norm(g.hn), an=norm(g.an);
        ADJ_CACHE[hn]=Math.max(-8,Math.min(8,(ADJ_CACHE[hn]||0)+delta));
        ADJ_CACHE[an]=Math.max(-8,Math.min(8,(ADJ_CACHE[an]||0)-delta));
        adjSet(ADJ_CACHE);
        sc[g.id].adj=+delta.toFixed(2);
      }
      sc[g.id].cal=true;
    }
    changed=true;
  });
  if(changed)scSet(sc);
  return sc;
}
function renderInsights(){
  const box=document.getElementById("insights"), tag=document.getElementById("insTag");
  if(!box) return;
  const sc=scGet(); const ids=Object.keys(sc).filter(k=>sc[k].pred);
  const n=ids.length;
  if(!n){ box.innerHTML=`<div class="empty" style="text-align:left">完賽累積後,模型會在這裡整理檢討心得與評級調整。</div>`; tag.textContent=""; return; }
  tag.textContent=`已學習 ${n} 場`;
  const S=ids.map(k=>sc[k]);
  const lessons=[];
  // 教訓1:和局偏差
  const draws=S.filter(s=>s.draw);
  if(draws.length>=2){
    const avgD=draws.reduce((a,s)=>a+s.pred.D,0)/draws.length;
    if(avgD<30) lessons.push(`和局共發生 ${draws.length} 次,模型平均只給 ${avgD.toFixed(0)}% 和局機率 → 偏差:低估均勢賽事,遇實力接近對戰應更保守`);
  }
  // 教訓2:主場優勢
  const hp=S.filter(s=>s.homePick).length, hw=S.filter(s=>s.hs>s.as).length;
  const hpr=hp/n*100, hwr=hw/n*100;
  if(n>=6&&Math.abs(hpr-hwr)>=15){
    lessons.push(hpr>hwr?`主隊被看好 ${hpr.toFixed(0)}%,實際主勝僅 ${hwr.toFixed(0)}% → 主場加成可能偏高,已透過逐場校準修正中`
      :`主隊被看好 ${hpr.toFixed(0)}%,實際主勝達 ${hwr.toFixed(0)}% → 主場加成可能偏低`);
  }
  // 教訓3:比分誤差
  const gdErr=S.reduce((a,s)=>a+Math.abs((s.hs-s.as)-(s.pred.si-s.pred.sj)),0)/n;
  if(gdErr>1.3) lessons.push(`平均淨勝球誤差 ${gdErr.toFixed(1)} 球,偏大 → 強弱差距判讀持續收斂中`);
  else lessons.push(`平均淨勝球誤差 ${gdErr.toFixed(1)} 球,在合理範圍`);
  // 評級異動 top
  const movers=Object.entries(ADJ_CACHE).filter(([k,v])=>Math.abs(v)>=0.3)
    .sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).slice(0,8);
  let html=`<div style="border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:14px 16px">`;
  html+=lessons.map(t=>`<div class="tl-item" style="margin-left:8px">${t}</div>`).join("");
  if(movers.length){
    html+=`<div class="pos-group" style="margin:12px 0 8px">評級校準異動(依賽果自動調整)</div><div style="display:flex;flex-wrap:wrap;gap:8px">`+
      movers.map(([k,v])=>{
        let nm=zhName(k); if(nm===k) nm=k.replace(/\b\w/g,c=>c.toUpperCase());
        const up=v>0;
        return `<span style="font-family:var(--mono);font-size:12.5px;padding:4px 11px;border-radius:999px;border:1px solid ${up?'rgba(70,196,106,.4)':'rgba(239,95,95,.4)'};color:${up?'var(--hit)':'var(--miss)'}">${nm} ${up?'▲':'▼'}${Math.abs(v).toFixed(1)}</span>`;
      }).join("")+`</div>`;
  }
  html+=`<div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:12px">心得由模型依實際賽果自動生成 · 校準值存於此瀏覽器,持續累積會越來越準</div></div>`;
  box.innerHTML=html;
}
function renderScorecard(){
  const sc=scGet(); const ids=Object.keys(sc);
  const n=ids.length, hit=ids.filter(k=>sc[k].hit).length;
  const brier=n?ids.reduce((s,k)=>s+sc[k].brier,0)/n:0;
  document.getElementById("scPct").textContent=n?Math.round(hit/n*100)+"%":"—";
  document.getElementById("scRec").textContent=hit+"/"+n;
  document.getElementById("scBrier").textContent=n?brier.toFixed(2):"—";
}

/* ================= 渲染 ================= */
function probBar(p){
  return `<div class="prob"><div class="prob-bar">
      <div class="h" style="width:${p.H}%"></div><div class="d" style="width:${p.D}%"></div><div class="a" style="width:${p.A}%"></div></div>
    <div class="prob-lbl"><span>主勝 <b>${p.H}%</b></span><span>和 <b>${p.D}%</b></span><span>客勝 <b>${p.A}%</b></span></div></div>`;
}
function teamRow(name,logo,score,win,pred){
  const zh=zhName(name), en=zh!==name?`<span style="color:var(--muted);font-size:12px">${name}</span>`:"";
  const logoImg=logo?`<img src="${logo}" alt="" onerror="this.style.visibility='hidden'">`:`<span style="width:26px"></span>`;
  const sc = score!=null?`<span class="sc">${score}</span>`:(pred!=null?`<span class="sc" style="color:var(--teal)">${pred}</span>`:"");
  return `<div class="team ${win?'win':''}">${logoImg}<span class="nm" data-team="${name}">${zh} ${en}</span>${sc}</div>`;
}
/* 賽後檢討:比對快照與實際,生成分析與教訓 */
function makeReview(g){
  const s=scGet()[g.id]; if(!s||!s.pred) return null;
  const p=s.pred, hz=s.hz, az=s.az;
  const parts=[];
  if(s.score){ parts.push("方向與比分全中,模型校準精準"); }
  else if(s.hit){
    parts.push("勝負方向命中,比分有誤差");
    const gdR=Math.abs(s.hs-s.as), gdP=Math.abs(p.si-p.sj);
    if(gdR>gdP) parts.push(`實際差距(${s.hs}-${s.as})比預測懸殊,勝方壓制力被低估`);
    else if(gdR<gdP) parts.push(`實際比預測膠著(${s.hs}-${s.as} vs ${p.si}-${p.sj}),弱方抵抗力被低估`);
    if(s.hs+s.as>p.si+p.sj+1) parts.push("雙方防線比預期鬆散");
    else if(s.hs+s.as+1<p.si+p.sj) parts.push("進球數低於模型預期");
  }else if(s.draw){
    parts.push(`和局未在預期內(賽前和局機率僅 ${p.D}%),兩隊實際更均勢`);
  }else{
    const w=s.hs>s.as?hz:az;
    parts.push(`預測失準:看好 ${zhName(p.pick)},實際 ${w} 勝出`);
  }
  if(s.adj){
    const up=s.adj>0?hz:az, dn=s.adj>0?az:hz;
    parts.push(`已自動校準:${up} 評級 +${Math.abs(s.adj)}、${dn} -${Math.abs(s.adj)},之後預測將反映`);
  }
  parts.push(`本場 Brier ${s.brier.toFixed(2)}`);
  return {text:parts.join(";")+"。", good:s.hit};
}
function gameCard(g){
  const p=predict(g.hn,g.an);
  const done=g.completed, live=g.state==="in";
  let pill;
  if(live) pill=`<span class="pill live"><span class="dot"></span>${g.detail||'進行中'}</span>`;
  else if(done){
    const realOut=g.hs>g.as?"H":g.hs<g.as?"A":"D";
    const predOut=p.H>=p.D&&p.H>=p.A?"H":p.A>=p.D&&p.A>=p.H?"A":"D";
    pill=realOut===predOut?`<span class="pill hit">命中</span>`:`<span class="pill miss">未中</span>`;
  } else pill=`<span class="pill wait">未開賽</span>`;

  const hWin=done&&g.hs>g.as, aWin=done&&g.as>g.hs;
  const rows=`<div class="teams">
    ${teamRow(g.hn,g.hlogo,done?g.hs:null,hWin,done?null:p.si)}
    ${teamRow(g.an,g.alogo,done?g.as:null,aWin,done?null:p.sj)}</div>`;

  let body="";
  if(done){
    const snap=scGet()[g.id];
    const sp=(snap&&snap.pred)?snap.pred:p;    // 用當初的預測快照,不因校準漂移
    const rv=makeReview(g);
    body=`<div class="predline"><span class="k">賽前預測</span> 看好 <span class="pick">${zhName(sp.pick)}</span> · 比分 <b>${sp.si}-${sp.sj}</b> · 信心 ${sp.conf||p.conf}</div>
      <div class="why"><span class="k">結果</span>${g.hs}-${g.as},實際 ${g.hs>g.as?zhName(g.hn):g.hs<g.as?zhName(g.an):'雙方戰平'}${g.hs===g.as?'':'勝出'}。</div>`+
      (rv?`<div class="review ${rv.good?'good':'bad'}"><span class="k">檢討</span>${rv.text}</div>`:"");
  }else{
    body=probBar(p)+`<div class="predline"><span class="k">預測</span>看好 <span class="pick">${zhName(p.pick)}</span> · 比分 <b>${p.si}-${p.sj}</b> · 信心 ${p.conf}</div>
      <div class="why"><span class="k">理由</span>${reasonText(g.hn,g.an,p)}</div>`;
  }
  return `<div class="game ${done?'done':''}"><div class="g-top"><span class="g-time">${g.time}</span>${pill}<button class="detail-btn" data-gid="${g.id}">詳情 ›</button></div>${rows}${body}</div>`;
}

function renderGames(games){
  const box=document.getElementById("games");

  if(!games.length){ box.innerHTML=`<div class="empty">這天沒有${LEAGUES.find(l=>l.id===curLeague).zh}賽事。<br>歐洲聯賽賽季約 8 月至隔年 5 月,休賽期無比賽——用上方日期切換到有賽事的日子。</div>`; return; }
  games.sort((a,b)=>a.time.localeCompare(b.time));
  GAMES_BY_ID={}; games.forEach(g=>GAMES_BY_ID[g.id]=g);
  box.innerHTML=games.map(gameCard).join("");

  box.querySelectorAll(".detail-btn").forEach(el=>el.onclick=()=>{const g=GAMES_BY_ID[el.dataset.gid]; if(g) showGame(g);});

function renderStandings(data){
  const box=document.getElementById("standings"), tag=document.getElementById("standTag");
  const val=(e,name)=>{const s=(e.stats||[]).find(x=>x.name===name||x.type===name);return s?(s.displayValue??s.value):"";};
  const groups=[];
  try{
    (data.children||[data]).forEach(gr=>{
      const entries=(gr.standings?.entries||gr.entries||[]);
      if(entries.length) groups.push({name:gr.name||gr.abbreviation||"", entries});
    });
  }catch(e){}
  const total=groups.reduce((s,g)=>s+g.entries.length,0);
  if(!total){ box.innerHTML=`<div class="empty">積分榜暫無資料(可能為休賽期或新賽季尚未開始)。</div>`; tag.textContent=""; return; }
  const confZh=n=>{const s=(n||"").toLowerCase();
    if(s.includes("east"))return"東區"; if(s.includes("west"))return"西區"; return n||"";};
  let html="";
  groups.forEach(g=>{
    const rows=g.entries.map((e,i)=>{
      const t=e.team||{}, nm=t.displayName||t.name||"";
      const rank=val(e,"rank")||i+1;
      const gp=val(e,"gamesPlayed"), w=val(e,"wins"), d=val(e,"ties")||val(e,"draws"), l=val(e,"losses");
      const gf=val(e,"pointsFor"), ga=val(e,"pointsAgainst"), gd=val(e,"pointDifferential"), pts=val(e,"points");
      STAND_CACHE[norm(nm)]={rank,gp,w,d,l,gf,ga,gd,pts,logo:(t.logos&&t.logos[0]&&t.logos[0].href)||""};
      const cls = i<4?"ucl":(groups.length===1&&i>=g.entries.length-3?"rel":"");
      const logo=t.logos&&t.logos[0]?`<img src="${t.logos[0].href}" onerror="this.style.display='none'">`:"";
      return `<tr class="${cls}"><td>${rank}</td><td data-team="${nm}">${logo}${zhName(nm)}</td>
        <td>${gp}</td><td>${w}</td><td>${d}</td><td>${l}</td><td>${gf}</td><td>${ga}</td><td>${gd}</td><td>${pts}</td></tr>`;
    }).join("");
    const head=groups.length>1?`<div class="pos-group" style="margin:14px 0 8px">${confZh(g.name)}</div>`:"";
    html+=head+`<div class="table-wrap"><table class="stand">
      <thead><tr><th>#</th><th>球隊</th><th>賽</th><th>勝</th><th>和</th><th>負</th><th>進</th><th>失</th><th>±</th><th>分</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  });
  box.innerHTML=html;
  tag.textContent=`${total} 隊${groups.length>1?" · "+groups.map(g=>confZh(g.name)).join("/"):""}`;
  box.querySelectorAll("td[data-team]").forEach(el=>el.onclick=()=>showTeam(el.dataset.team));
}

function renderHeadlines(games){
  const box=document.getElementById("headlines");
  const tag=document.getElementById("hlTag");
  if(tag) tag.textContent = REAL_NEWS.length? "ESPN 即時 + 賽果生成" : "賽果自動生成(ESPN 新聞暫無回應)";
  let realHTML=REAL_NEWS.map(n=>
    `<div class="headline" style="cursor:${n.link?'pointer':'default'};border-left-color:#c0392b" ${n.link?`data-link="${n.link}"`:""}>
      <span class="hk" style="color:#c0392b">ESPN</span>${n.t}<span style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:10px">${n.d}${n.link?" · 原文 ›":""}</span></div>`).join("");
  const done=games.filter(g=>g.completed);
  if(!done.length&&!REAL_NEWS.length){ box.innerHTML=`<div class="empty" style="text-align:left">尚無頭條。有賽果或 ESPN 新聞後自動顯示。</div>`; return; }
  if(!done.length){ box.innerHTML=realHTML; box.querySelectorAll("[data-link]").forEach(el=>el.onclick=()=>window.open(el.dataset.link,"_blank","noopener")); return; }
  const items=done.slice(0, Math.max(2, 6-REAL_NEWS.length)).map(g=>{
    const p=predict(g.hn,g.an);
    const winner=g.hs>g.as?zhName(g.hn):g.hs<g.as?zhName(g.an):null;
    const margin=Math.abs(g.hs-g.as);
    const upset=winner && ((winner===zhName(g.hn)&&p.H<30)||(winner===zhName(g.an)&&p.A<30));
    let k,t;
    if(!winner){k="平局";t=`${zhName(g.hn)} ${g.hs}-${g.as} ${zhName(g.an)},握手言和`;}
    else if(upset){k="爆冷";t=`爆冷!${winner} 擊敗對手,${g.hs}-${g.as}`;}
    else if(margin>=3){k="大勝";t=`${winner} ${Math.max(g.hs,g.as)}-${Math.min(g.hs,g.as)} 大勝`;}
    else{k="賽果";t=`${zhName(g.hn)} ${g.hs}-${g.as} ${zhName(g.an)}`;}
    return `<div class="headline"><span class="hk">${k}</span>${t}</div>`;
  }).join("");
  box.innerHTML=realHTML+items;
  box.querySelectorAll("[data-link]").forEach(el=>el.onclick=()=>window.open(el.dataset.link,"_blank","noopener"));
}

async function showTeam(name, fromPop){
  if(!fromPop){ try{history.pushState({v:"team",name:name},"");}catch(e){} }
  document.getElementById("teamView").classList.remove("hidden");
  ["fixturesSec","insightSec","standSec","hlSec","gameView"].forEach(id=>document.getElementById(id).classList.add("hidden"));
  document.getElementById("teamTitle").textContent=zhName(name);
  const box=document.getElementById("roster");
  window.scrollTo(0,0);

  // 球隊賽季數據橫幅(從積分榜快取)
  const s=STAND_CACHE[norm(name)];
  let banner="";
  if(s){
    const cells=[["排名","#"+s.rank],["賽",s.gp],["勝",s.w],["和",s.d],["負",s.l],["進",s.gf],["失",s.ga],["淨",s.gd],["積分",s.pts]];
    banner=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:7px;margin-bottom:16px">`+
      cells.map(([l,v])=>`<div style="border:1px solid var(--line);border-radius:9px;background:var(--panel);padding:9px 6px;text-align:center">
        <div style="font-family:var(--mono);font-weight:600;font-size:19px;color:${l==='積分'?'var(--amber)':'var(--chalk)'}">${v!==""&&v!=null?v:'—'}</div>
        <div style="font-family:var(--cond);letter-spacing:.06em;text-transform:uppercase;font-size:10.5px;color:var(--muted)">${l}</div></div>`).join("")+`</div>`;
  }
  const injL=INJURIES[norm(name)];
  if(injL&&injL.length){
    banner+=`<div style="border:1px solid rgba(239,95,95,.3);border-radius:10px;background:rgba(239,95,95,.06);padding:10px 14px;margin-bottom:14px;font-size:13px">
      <span style="font-family:var(--cond);font-weight:700;letter-spacing:.08em;color:var(--miss)">🚑 傷兵/停賽</span> `+
      injL.map(x=>`<span style="margin-left:10px">${x.name}<span style="color:var(--muted)">(${x.status})</span></span>`).join("")+`</div>`;
  }
  box.dataset.banner = banner;
  // 先從已載入的球員索引找出整隊(即時、真實名冊)
  const roster = PLAYER_INDEX.filter(p=>norm(p.teamName)===norm(name));
  if(roster.length){
    const byPos = {"前鋒":[],"中場":[],"後衛":[],"門將":[],"其他":[]};
    const posZh = pos=>{const p=(pos||"").toLowerCase();
      if(p.includes("forward")||p==="f"||p.includes("striker")||p.includes("wing"))return"前鋒";
      if(p.includes("mid")||p==="m")return"中場";
      if(p.includes("back")||p==="d"||p.includes("defen"))return"後衛";
      if(p.includes("goal")||p==="g"||p==="gk")return"門將";return"其他";};
    roster.forEach(p=>byPos[posZh(p.pos)].push(p));
    let html="";
    ["前鋒","中場","後衛","門將","其他"].forEach(grp=>{
      if(!byPos[grp].length)return;
      html+=`<div class="pos-group">${grp}</div>`;
      html+=byPos[grp].map(p=>{
        const av=p.headshot?`<img class="avatar" style="object-fit:cover" src="${p.headshot}" data-init="${(p.name||'?').charAt(0)}" onerror="avFallback(this)">`:`<div class="avatar">${(p.name||'?').charAt(0)}</div>`;
        const star=starsFor(name)&&starsFor(name).some(s=>p.name.includes(s[0].split(" ").pop()))?`<span class="badge star">⭐</span>`:"";
        return `<div class="player" data-player='${encodeURIComponent(JSON.stringify(p))}' style="cursor:pointer">${av}
          <div><div class="p-top"><span class="pnm">${p.name}</span>${star}<span class="pmeta">${p.pos}${p.num?' · #'+p.num:''}</span></div>
          ${p.nat?`<div class="p-note">${p.nat}</div>`:""}</div></div>`;
      }).join("");
    });
    box.innerHTML=(box.dataset.banner||"")+html;
    box.querySelectorAll(".player[data-player]").forEach(el=>el.onclick=()=>showPlayer(JSON.parse(decodeURIComponent(el.dataset.player))));
    return;
  }

  // 索引沒涵蓋這隊 → 即時抓該隊名冊(不再只顯示空頁)
  box.innerHTML = `<div class="empty">正在載入 ${zhName(name)} 的名冊…</div>`;
  (async()=>{
    try{
      // 在六個聯賽中找這支球隊的 id
      let found=null, foundLg=null;
      for(const lg of LEAGUES){
        try{
          const teams=await getTeamList(lg.id);
          const t=teams.find(x=>norm(x.displayName)===norm(name)||norm(x.displayName).includes(norm(name))||norm(name).includes(norm(x.displayName)));
          if(t){found=t;foundLg=lg.id;break;}
        }catch(e){}
      }
      if(!found) throw new Error("找不到球隊");
      const flat=await fetchTeamRoster(foundLg,found.id);
      if(!flat.length) throw new Error("名冊無資料");
      const players=flat.map(a=>athleteToIdx(a,found.displayName,foundLg));
      players.forEach(p=>{ if(!PLAYER_INDEX.some(x=>x.id===p.id&&x.teamName===p.teamName)) PLAYER_INDEX.push(p); });
      showTeam(name, true);   // 重進:此時索引已有,走完整名冊路徑(不重複寫入歷史)
    }catch(e){
      const stars=starsFor(name);
      let fb = stars? `<div class="pos-group">代表球星</div>`+stars.map(([n,pos,note])=>
        `<div class="player"><div class="avatar">${n.charAt(0)}</div><div>
          <div class="p-top"><span class="pnm">${n}</span><span class="badge star">⭐ ${pos}</span></div>
          <div class="p-note">${note}</div></div></div>`).join("") : "";
      box.innerHTML = (box.dataset.banner||"") + fb +
        `<div class="empty">${zhName(name)} 名冊載入失敗(${e.message})。<br>可能是 ESPN 端點暫時無回應,稍後點「更新」重試。</div>`;
    }
  })();
}
/* ================= 比賽詳情頁(像 MLB 版的逐場解說) ================= */
const GSTAT_ZH={possessionPct:"控球率 %",totalShots:"射門",shotsOnTarget:"射正",wonCorners:"角球",
  foulsCommitted:"犯規",offsides:"越位",saves:"撲救",yellowCards:"黃牌",redCards:"紅牌",totalPasses:"傳球",accuratePasses:"準確傳球"};
function gameNarrative(g,goals,statPairs){
  const hz=zhName(g.hn),az=zhName(g.an),p=predict(g.hn,g.an);
  const parts=[];
  if(g.completed){
    const w=g.hs>g.as?hz:g.hs<g.as?az:null;
    if(!w) parts.push(`${hz} ${g.hs}-${g.as} ${az},雙方戰平`);
    else parts.push(`${w}以 ${Math.max(g.hs,g.as)}-${Math.min(g.hs,g.as)} ${g.hs>g.as?"主場":"客場"}${Math.abs(g.hs-g.as)>=3?"大勝":"擊敗"}對手`);
    const predOut=p.H>=p.D&&p.H>=p.A?"H":p.A>=p.D&&p.A>=p.H?"A":"D";
    const realOut=g.hs>g.as?"H":g.hs<g.as?"A":"D";
    if(predOut===realOut) parts.push(`模型賽前看好${p.pick===g.hn?hz:az}(${Math.max(p.H,p.A).toFixed(0)}%),方向命中`);
    else parts.push(`模型賽前看好${p.pick===g.hn?hz:az}(${Math.max(p.H,p.A).toFixed(0)}%),此役未能命中`);
    // 數據佐證(有才寫)
    const pos=statPairs.find(s=>s.key==="possessionPct"), sot=statPairs.find(s=>s.key==="shotsOnTarget");
    if(pos) parts.push(`控球 ${pos.h}% 對 ${pos.a}%`);
    if(sot) parts.push(`射正 ${sot.h} 比 ${sot.a}`);
    if(goals.length) parts.push(`共 ${goals.length} 粒進球`);
  }else{
    parts.push(`${hz}主場迎戰${az}`);
    parts.push(`模型預測:主勝 ${p.H}%、和 ${p.D}%、客勝 ${p.A}%,看好${p.pick===g.hn?hz:az},預期比分 ${p.si}-${p.sj}`);
    parts.push(`信心 ${p.conf}`);
  }
  return parts.join(",")+"。(解說由模型與 ESPN 數據自動生成)";
}
async function showGame(g, fromPop){
  if(!fromPop){ try{history.pushState({v:"game",id:g.id,g:g},"");}catch(e){} }
  ["fixturesSec","insightSec","standSec","hlSec","teamView"].forEach(id=>document.getElementById(id).classList.add("hidden"));
  document.getElementById("gameView").classList.remove("hidden");
  const hz=zhName(g.hn),az=zhName(g.an);
  document.getElementById("gameTitle").textContent=`${hz} ${g.completed||g.state==="in"?g.hs+" - "+g.as:"vs"} ${az}`;
  const box=document.getElementById("gameDetail");
  const p=predict(g.hn,g.an);
  box.innerHTML=`<div class="empty">載入比賽數據中…</div>`;
  window.scrollTo(0,0);
  let sum=null;
  try{ sum=await jget(espnSummary(g.league||curLeague, g.id)); }catch(e){}
  // --- 進球/紅黃牌時間軸 ---
  let goals=[],cards=[];
  try{
    (sum.keyEvents||[]).forEach(ev=>{
      const t=((ev.type&&ev.type.text)||"").toLowerCase();
      const min=(ev.clock&&ev.clock.displayValue)||"";
      const txt=ev.text||((ev.participants||[]).map(x=>x.athlete&&x.athlete.displayName).filter(Boolean).join(", "));
      if(t.includes("goal")&&!t.includes("own")) goals.push({min,txt});
      else if(t.includes("own goal")) goals.push({min,txt:txt+"(烏龍球)"});
      else if(t.includes("card")) cards.push({min,txt,red:t.includes("red")});
    });
  }catch(e){}
  // --- 球隊數據對比 ---
  let statPairs=[];
  try{
    const tms=sum.boxscore.teams;
    const hIdx=norm(tms[0].team.displayName)===norm(g.hn)?0:1, aIdx=1-hIdx;
    const hst=tms[hIdx].statistics||[], ast=tms[aIdx].statistics||[];
    Object.keys(GSTAT_ZH).forEach(k=>{
      const hv=(hst.find(x=>x.name===k)||{}).displayValue, av=(ast.find(x=>x.name===k)||{}).displayValue;
      if(hv!=null&&av!=null) statPairs.push({key:k,label:GSTAT_ZH[k],h:hv,a:av});
    });
  }catch(e){}
  // --- 先發陣容 ---
  let lineups="";
  try{
    const cols=(sum.rosters||[]).map(r=>{
      const tName=(r.team&&r.team.displayName)||"";
      const starters=(r.roster||[]).filter(x=>x.starter).map(x=>{
        const a=x.athlete||{}; const nm=a.displayName||"";
        const injured=INJ_BY_PLAYER[norm(nm)]?` <span style="color:var(--miss)">🚑</span>`:"";
        return `<div class="pl lu-p" style="cursor:pointer" data-pid="${a.id||""}" data-pname="${nm.replace(/"/g,"&quot;")}" data-ppos="${(x.position&&x.position.abbreviation)||""}" data-pnum="${x.jersey||""}" data-pteam="${tName.replace(/"/g,"&quot;")}"><b>${x.jersey||""}</b>${nm}${injured} <span style="color:var(--muted);font-size:11px">${(x.position&&x.position.abbreviation)||""}</span></div>`;
      }).join("");
      return starters?`<div class="lineup-col"><div class="t" style="cursor:pointer" data-team="${tName.replace(/"/g,"&quot;")}">${zhName(tName)} 先發 ›</div>${starters}</div>`:"";
    }).filter(Boolean);
    if(cols.length) lineups=`<div class="pos-group">先發陣容</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px">${cols.join("")}</div>`;
  }catch(e){}
  // --- 組頁 ---
  let narrative=gameNarrative(g,goals,statPairs);
  const rv0=makeReview(g);
  if(rv0) narrative+=` 檢討:${rv0.text}`;
  let html=`<div class="why" style="border-top:none;border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:13px 15px;margin-bottom:14px"><span class="k">解說</span>${narrative}</div>`;
  if(!g.completed&&g.state!=="in"){
    html+=probBar(p)+`<div class="predline" style="margin-bottom:14px"><span class="k">預測</span>看好 <span class="pick">${zhName(p.pick)}</span> · 比分 <b>${p.si}-${p.sj}</b> · 信心 ${p.conf}</div>
      <div class="why"><span class="k">理由</span>${reasonText(g.hn,g.an,p)}</div>`;
  }
  if(goals.length||cards.length){
    html+=`<div class="pos-group">比賽事件</div><div class="tl">`+
      goals.map(x=>`<div class="tl-item goal"><span class="tl-min">${x.min}</span>⚽ ${x.txt}</div>`).join("")+
      cards.map(x=>`<div class="tl-item card"><span class="tl-min">${x.min}</span>${x.red?"🟥":"🟨"} ${x.txt}</div>`).join("")+`</div>`;
  }
  if(statPairs.length){
    html+=`<div class="pos-group">數據對比</div><div style="border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:14px 16px">
      <div class="cmp-row" style="margin-bottom:12px"><div class="v h" style="color:var(--chalk);cursor:pointer" data-team="${g.hn.replace(/"/g,"&quot;")}">${hz} ›</div><div class="l">vs</div><div class="v" style="color:var(--chalk);cursor:pointer" data-team="${g.an.replace(/"/g,"&quot;")}">${az} ›</div></div>`+
      statPairs.map(s=>{
        const hn=parseFloat(s.h)||0, an=parseFloat(s.a)||0, tot=(hn+an)||1;
        return `<div class="cmp-row"><div class="v h">${s.h}<div class="cmp-bar" style="direction:rtl"><div style="width:${hn/tot*100}%"></div></div></div>
          <div class="l">${s.label}</div>
          <div class="v">${s.a}<div class="cmp-bar"><div style="width:${an/tot*100}%;background:var(--awy)"></div></div></div></div>`;
      }).join("")+`</div>`;
  }
  html+=lineups;
  if(!goals.length&&!statPairs.length&&!lineups){
    html+=`<div class="empty">${g.completed?"ESPN 未提供此場的詳細數據。":"尚未開賽——開賽後這裡會顯示進球事件、數據對比與先發陣容。"}</div>`;
  }
  box.innerHTML=html;
  // 點球隊名 → 球隊頁
  box.querySelectorAll("[data-team]").forEach(el=>el.onclick=()=>showTeam(el.dataset.team));
  // 點先發球員 → 球員詳細頁(索引找得到用完整資料,找不到用當場資料)
  box.querySelectorAll(".lu-p").forEach(el=>el.onclick=()=>{
    const {pid,pname,ppos,pnum,pteam}=el.dataset;
    let p=PLAYER_INDEX.find(x=>String(x.id)===String(pid)) || PLAYER_INDEX.find(x=>norm(x.name)===norm(pname));
    if(!p) p={id:pid,name:pname,pos:ppos,num:pnum,teamName:pteam,headshot:espnHeadshot(pid),age:"",nat:"",league:g.league||curLeague};
    showPlayer(p);
  });
}
function hideTeam(){
  document.getElementById("teamView").classList.add("hidden");
  document.getElementById("gameView").classList.add("hidden");
  ["fixturesSec","insightSec","standSec","hlSec"].forEach(id=>document.getElementById(id).classList.remove("hidden"));
}

/* ================= 載入 ================= */
async function load(){
  const btn=document.getElementById("loadBtn"), st=document.getElementById("status");
  btn.classList.add("spin"); btn.disabled=true; st.className="status"; st.textContent="載入中…";
  hideTeam();
  const dateStr=ymd(curDate);
  document.getElementById("upd").textContent=isoDate(curDate)+" "+new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false});
  try{
    // ESPN 以美國/UTC 日期分組;抓「前一天+當天」範圍再依台灣當日過濾,確保台灣時間正確
    const d0=new Date(curDate); d0.setDate(d0.getDate()-1);
    const data=await jget(espnScore(curLeague, ymd(d0)+"-"+dateStr));
    const games=parseEvents(data).filter(g=>g.localIso===isoDate(curDate));
    gradeFinished(games);
    renderScorecard();
    renderInsights();
    try{ await loadNews(); }catch(e){}
    renderGames(games);
    renderHeadlines(games);
    st.textContent=`已更新 · ${games.length} 場`;
  }catch(e){
    document.getElementById("games").innerHTML=`<div class="empty">無法載入賽事資料。<br>可能是網路、跨域限制或該聯賽代碼異常。稍後再試或切換聯賽。<br><span style="color:var(--miss)">${e.message}</span></div>`;
    st.className="status err"; st.textContent="載入失敗";
  }
  // standings(獨立,失敗不影響賽事)
  try{
    const sd=await jget(espnStand(curLeague));
    renderStandings(sd);
  }catch(e){
    document.getElementById("standings").innerHTML=`<div class="empty">積分榜暫時無法載入(休賽期或來源限制)。</div>`;
  }
  btn.classList.remove("spin"); btn.disabled=false;
}

/* ================= 初始化 ================= */
function buildLeagueTabs(){
  const box=document.getElementById("leagueTabs");
  box.innerHTML=LEAGUES.map(l=>`<button class="lg ${l.id===curLeague?'on':''}" data-lg="${l.id}">${l.zh}</button>`).join("");
  box.querySelectorAll(".lg").forEach(el=>el.onclick=()=>{
    curLeague=el.dataset.lg;
    document.querySelectorAll(".lg").forEach(x=>x.classList.toggle("on",x.dataset.lg===curLeague));
    const lg=LEAGUES.find(l=>l.id===curLeague);
    document.getElementById("lgName").textContent=lg.full;
    STAND_CACHE={};                                   // 清掉上一聯賽的戰績快取
    document.getElementById("searchResults").innerHTML="";
    if(!allIndexLoaded && !allBuilding){              // 全聯賽索引尚未就緒 → 先建當前聯賽的
      indexedLeague=null; PLAYER_INDEX=[];
      buildPlayerIndex(curLeague);
    }
    document.getElementById("searchResults").innerHTML="";
    load();
    buildPlayerIndex(curLeague);
  });
}
function applyTheme(t){
  if(t==="navy") document.body.removeAttribute("data-theme");
  else document.body.setAttribute("data-theme",t);
  document.querySelectorAll(".th").forEach(x=>x.classList.toggle("on",x.dataset.th===t));
  try{localStorage.setItem("euroTheme",t);}catch(e){}
}
function init(){
  document.getElementById("buildTag").textContent="build "+BUILD;
  let th="navy"; try{th=localStorage.getItem("euroTheme")||"navy";}catch(e){}
  applyTheme(th);
  document.querySelectorAll(".th").forEach(el=>el.onclick=()=>applyTheme(el.dataset.th));
  document.querySelectorAll(".nav-p").forEach(el=>el.onclick=()=>{
    hideTeam();
    const s=document.getElementById(el.dataset.sec);
    if(s) try{s.scrollIntoView({behavior:"smooth"});}catch(e){s.scrollIntoView();}
  });
  buildLeagueTabs();
  const dp=document.getElementById("datePick");
  dp.value=isoDate(curDate);
  dp.onchange=()=>{const [y,m,d]=dp.value.split("-").map(Number);curDate=new Date(y,m-1,d);load();};
  document.getElementById("prevBtn").onclick=()=>{curDate.setDate(curDate.getDate()-1);dp.value=isoDate(curDate);load();};
  document.getElementById("nextBtn").onclick=()=>{curDate.setDate(curDate.getDate()+1);dp.value=isoDate(curDate);load();};
  document.getElementById("todayBtn").onclick=()=>{curDate=new Date();dp.value=isoDate(curDate);load();};
  document.getElementById("loadBtn").onclick=load;
  document.getElementById("backBtn").onclick=()=>{ if(history.state&&history.state.v){history.back();} else hideTeam(); };
  // 瀏覽器上一頁:回到主列表或上一個檢視,而不是整頁跑掉
  window.addEventListener("popstate",e=>{
    const s=e.state;
    if(!s||!s.v) hideTeam();
    else if(s.v==="team") showTeam(s.name,true);
    else if(s.v==="player") showPlayer(s.p,true);
    else if(s.v==="game"&&s.g) showGame(s.g,true);
  });
  document.getElementById("gameBackBtn").onclick=()=>{ if(history.state&&history.state.v){history.back();} else hideTeam(); };
  const sb=document.getElementById("searchBox");
  let sTimer=null;
  sb.addEventListener("input",e=>{ clearTimeout(sTimer); sTimer=setTimeout(()=>searchPlayers(e.target.value),180); });
  // 位置篩選 chip
  document.querySelectorAll(".fchip[data-pos]").forEach(el=>el.onclick=()=>{
    curPos=el.dataset.pos;
    document.querySelectorAll(".fchip[data-pos]").forEach(x=>x.classList.toggle("on",x===el));
    searchPlayers(sb.value);
  });
  // 跨五大聯賽 toggle
  document.getElementById("crossBtn").onclick=async()=>{   // 點=手動強制重抓最新名冊
    TEAM_LIST={}; allIndexLoaded=false; indexedLeague=null;
    await buildAllLeaguesIndex();
    if(allIndexLoaded){ crossLeague=true; document.getElementById("crossBtn").classList.add("on"); }
    searchPlayers(sb.value);
  };
  load();
  buildPlayerIndex(curLeague);
  // 全自動:1.5 秒後在背景把六個聯賽的球員全部抓好(不用手動點)
  setTimeout(async()=>{
    await buildAllLeaguesIndex();
    if(allIndexLoaded){ crossLeague=true; const b=document.getElementById("crossBtn"); if(b) b.classList.add("on"); }
  },1500);
  // 名冊每 30 分鐘自動重抓(轉會/升降名單變動);比分每 90 秒、球員數據點開即時抓
  setInterval(()=>{
    if(document.hidden) return;
    TEAM_LIST={}; allIndexLoaded=false; indexedLeague=null;
    buildAllLeaguesIndex().then(()=>{ if(allIndexLoaded){ crossLeague=true; const b=document.getElementById("crossBtn"); if(b) b.classList.add("on"); } });
  }, 1800000);
  setTimeout(loadInjuries, 2000);            // 開站 2 秒後抓傷兵
  setInterval(()=>{ if(!document.hidden) loadInjuries(); }, 600000);   // 每 10 分鐘更新傷兵
  setInterval(()=>{ if(!document.hidden) load(); }, 90000);  // 每 90 秒自動更新
}
init();
</script>
