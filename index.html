<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歐洲足球 預測計分板</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%2314283d'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%234ecac1' stroke-width='2.4'/%3E%3Cpath d='M32 16 L40 22 L37 32 L27 32 L24 22 Z' fill='%234ecac1'/%3E%3Crect x='19' y='45' width='8' height='4' rx='2' fill='%2346c46a'/%3E%3Crect x='28' y='45' width='8' height='4' rx='2' fill='%23ffc247'/%3E%3Crect x='37' y='45' width='8' height='4' rx='2' fill='%23ef5f5f'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --field:#0c1a2b; --panel:#14283d; --panel-2:#1a3149;
    --line:rgba(226,236,232,.14); --chalk:#eef4f1; --muted:#8299ac;
    --wash:rgba(255,255,255,.07); --wash2:rgba(255,255,255,.13); --ink2:#d6e0da; --btn-ink:#0c1a2b;
    --amber:#ffc247; --teal:#4ecac1; --hit:#46c46a; --miss:#ef5f5f; --grow:#7ec96f;
    --home:#46c46a; --draw:#ffc247; --awy:#ef5f5f;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --cond:'Barlow Condensed',sans-serif; --body:'Noto Sans TC',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1200px 600px at 50% -10%, #163150 0%, transparent 60%), var(--field);
    color:var(--chalk); font-family:var(--body); line-height:1.6; min-height:100vh;
    padding:clamp(16px,4vw,40px) clamp(14px,4vw,28px) 60px;}
  .wrap{max-width:960px;margin:0 auto}
  header{border:1px solid var(--line);border-radius:14px;
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    padding:clamp(18px,4vw,30px);position:relative;overflow:hidden}
  header::before{content:"";position:absolute;inset:0;opacity:.5;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:10px 10px}
  .eyebrow{font-family:var(--cond);letter-spacing:.22em;text-transform:uppercase;font-size:14px;color:var(--muted);font-weight:600}
  h1{font-family:var(--cond);font-weight:700;letter-spacing:.02em;font-size:clamp(28px,7vw,50px);line-height:1;margin:2px 0 14px;
    display:flex;align-items:center;gap:13px}
  h1 .ball{color:var(--amber)}
  .sitelogo{width:clamp(38px,9vw,52px);height:clamp(38px,9vw,52px);flex:0 0 auto}
  .buildtag{font-family:var(--mono);font-size:11px;color:var(--amber);background:rgba(255,194,71,.12);
    padding:2px 9px;border-radius:999px;font-weight:600}

  /* league tabs */
  .leagues{display:flex;gap:7px;flex-wrap:wrap;margin:4px 0 16px}
  .lg{font-family:var(--cond);font-weight:600;letter-spacing:.04em;font-size:15px;color:var(--muted);
    background:var(--wash);border:1px solid var(--line);border-radius:999px;padding:7px 16px;cursor:pointer;transition:.12s}
  .lg:hover{color:var(--chalk)}
  .lg.on{color:var(--btn-ink);background:var(--amber);border-color:var(--amber);font-weight:700}

  .datebar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .nav{font-family:var(--mono);font-weight:600;font-size:18px;color:var(--chalk);background:var(--wash);
    border:1px solid var(--line);border-radius:9px;width:40px;height:40px;cursor:pointer}
  .nav:hover{background:var(--wash2)}
  input[type=date]{font-family:var(--mono);font-weight:600;font-size:16px;color:var(--chalk);background:var(--wash);
    border:1px solid var(--line);border-radius:9px;padding:8px 12px;cursor:pointer}
  .today-btn{font-family:var(--cond);font-weight:600;letter-spacing:.06em;font-size:14px;color:var(--muted);
    background:none;border:1px solid var(--line);border-radius:999px;padding:7px 14px;cursor:pointer}
  .today-btn:hover{color:var(--chalk)}
  .btn{margin-left:auto;font-family:var(--cond);font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:16px;
    color:var(--btn-ink);background:var(--amber);border:none;border-radius:999px;padding:11px 22px;cursor:pointer;
    display:inline-flex;align-items:center;gap:9px;box-shadow:0 4px 18px rgba(255,194,71,.28)}
  .btn:disabled{opacity:.6;cursor:default;box-shadow:none}
  .btn.spin .ico{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .searchbar{display:flex;gap:8px;position:relative;margin-bottom:14px}
  .searchbar input{flex:1;font-family:var(--body);font-size:15px;color:var(--chalk);background:var(--wash);
    border:1px solid var(--line);border-radius:999px;padding:10px 18px;outline:none}
  .searchbar input::placeholder{color:var(--muted)}
  .searchbar input:focus{border-color:var(--teal)}
  .search-results{margin-bottom:8px}
  .filterbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:2px 0 2px}
  .fchip{font-family:var(--cond);font-weight:600;letter-spacing:.03em;font-size:13.5px;color:var(--muted);
    background:var(--wash);border:1px solid var(--line);border-radius:999px;padding:5px 13px;cursor:pointer;transition:.12s}
  .fchip:hover{color:var(--chalk)}
  .fchip.on{color:var(--btn-ink);background:var(--teal);border-color:var(--teal);font-weight:700}
  .fchip.cross.on{background:var(--amber);border-color:var(--amber)}
  .fdiv{width:1px;height:20px;background:var(--line);margin:0 3px}
  .sr-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border:1px solid var(--line);
    border-radius:9px;background:var(--panel);margin-bottom:6px;cursor:pointer}
  .sr-item:hover{background:var(--panel-2)}
  .sr-item .pos{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .sr-item .tm{margin-left:auto;font-size:12.5px;color:var(--teal)}
  .sr-ava{width:32px;height:32px;border-radius:50%;flex:0 0 32px;object-fit:cover;background:var(--panel-2);border:1px solid var(--line);color:var(--muted)}

  .score-row{display:flex;flex-wrap:wrap;gap:clamp(16px,5vw,40px);align-items:flex-end}
  .stat .num{font-family:var(--mono);font-weight:600;color:var(--amber);font-size:clamp(28px,8vw,46px);line-height:.9}
  .stat .num.small{color:var(--chalk);font-size:clamp(20px,5vw,32px)}
  .stat .lbl{font-family:var(--cond);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-size:13px;margin-top:6px;font-weight:600}
  .status{margin-left:auto;font-family:var(--mono);font-size:12.5px;color:var(--muted);text-align:right;align-self:flex-end}
  .status.err{color:var(--miss)}

  section{margin-top:clamp(24px,6vw,38px)}
  .sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:14px}
  .sec-head h2{font-family:var(--cond);font-weight:700;letter-spacing:.04em;font-size:clamp(20px,5vw,26px);text-transform:uppercase}
  .sec-head .tag{font-family:var(--mono);font-size:13px;color:var(--muted)}
  .sec-head .back{margin-left:auto;font-family:var(--cond);font-weight:600;font-size:14px;color:var(--muted);
    background:none;border:1px solid var(--line);border-radius:999px;padding:6px 14px;cursor:pointer}
  .sec-head .back:hover{color:var(--chalk)}

  .game{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:14px clamp(14px,3vw,18px);margin-bottom:12px}
  .game.done{background:linear-gradient(90deg,var(--panel),var(--panel-2))}
  .g-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .g-time{font-family:var(--mono);font-size:12.5px;color:var(--muted)}
  .teams{display:flex;flex-direction:column;gap:7px}
  .team{display:flex;align-items:center;gap:10px}
  .team img{width:26px;height:26px;object-fit:contain;flex:0 0 26px}
  .team .nm{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;border-bottom:1px dashed transparent}
  .team .nm:hover{color:var(--teal);border-bottom-color:var(--teal)}
  .team .sc{font-family:var(--mono);font-weight:600;margin-left:auto;font-size:20px;color:var(--muted)}
  .team.win .nm{color:var(--chalk);font-weight:700} .team.win .sc{color:var(--amber)}
  .pill{font-family:var(--cond);font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:12px;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .pill.hit{background:rgba(70,196,106,.16);color:var(--hit);border:1px solid rgba(70,196,106,.4)}
  .pill.miss{background:rgba(239,95,95,.14);color:var(--miss);border:1px solid rgba(239,95,95,.4)}
  .pill.wait{background:rgba(130,153,172,.14);color:var(--muted);border:1px solid var(--line)}
  .pill.live{background:rgba(239,95,95,.14);color:#ff8a8a;border:1px solid rgba(239,95,95,.4)}
  .pill.live .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#ff6b6b;margin-right:5px;animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.25}}

  .prob{margin-top:12px}
  .prob-bar{height:9px;border-radius:5px;overflow:hidden;background:var(--wash);display:flex}
  .prob-bar .h{background:var(--home)} .prob-bar .d{background:var(--draw)} .prob-bar .a{background:var(--awy)}
  .prob-lbl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:6px}
  .prob-lbl b{color:var(--chalk);font-weight:600}
  .predline{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:13px;color:var(--ink2);align-items:center}
  .predline .k{font-family:var(--cond);font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:11px;color:var(--muted)}
  .predline b{color:var(--teal);font-family:var(--mono)}
  .predline .pick{color:var(--amber);font-weight:700}
  .why,.review{border-top:1px dashed var(--line);margin-top:12px;padding-top:10px;font-size:13.5px;color:var(--ink2);line-height:1.6}
  .why .k,.review .k{font-family:var(--cond);font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:12px;margin-right:8px}
  .why .k{color:var(--teal)} .review.good .k{color:var(--hit)} .review.bad .k{color:var(--miss)}

  /* standings */
  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px;background:var(--panel)}
  table.stand{border-collapse:collapse;width:100%;min-width:520px;font-size:13px}
  table.stand th{font-family:var(--cond);letter-spacing:.06em;text-transform:uppercase;font-size:12px;color:var(--muted);
    text-align:right;padding:10px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  table.stand th:nth-child(2){text-align:left}
  table.stand td{font-family:var(--mono);text-align:right;padding:9px 10px;border-bottom:1px solid rgba(226,236,232,.06);white-space:nowrap;color:var(--ink2)}
  table.stand td:nth-child(2){text-align:left;font-family:var(--body);cursor:pointer}
  table.stand td:nth-child(2):hover{color:var(--teal)}
  table.stand td img{width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:7px}
  table.stand tr td:last-child{color:var(--amber);font-weight:600}
  table.stand tr.ucl td:first-child{box-shadow:inset 3px 0 var(--teal)}
  table.stand tr.rel td:first-child{box-shadow:inset 3px 0 var(--miss)}

  .headline{border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:10px;background:var(--panel);
    padding:12px 16px;margin-bottom:8px;font-size:14.5px;color:var(--ink2)}
  .headline .hk{font-family:var(--cond);font-weight:700;letter-spacing:.1em;font-size:12px;text-transform:uppercase;color:var(--amber);margin-right:8px}

  /* team page */
  .pos-group{font-family:var(--cond);font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:15px;color:var(--muted);margin:20px 0 10px}
  .player{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:12px 16px;margin-bottom:8px;display:flex;gap:14px;align-items:center}
  .avatar{width:52px;height:52px;border-radius:50%;flex:0 0 52px;background:var(--panel-2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-family:var(--cond);font-weight:700;font-size:18px;color:var(--muted)}
  .p-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .p-top .pnm{font-weight:700;font-size:15.5px} .p-top .pmeta{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .badge{font-family:var(--cond);font-weight:700;letter-spacing:.06em;font-size:12px;padding:2px 9px;border-radius:999px}
  .badge.star{background:rgba(255,194,71,.15);color:var(--amber);border:1px solid rgba(255,194,71,.45)}
  .p-note{font-size:13px;color:var(--ink2);margin-top:4px}

  .empty{color:var(--muted);border:1px dashed var(--line);border-radius:10px;padding:22px;text-align:center;font-size:14.5px}
  footer{margin-top:38px;color:var(--muted);font-size:12.5px;font-family:var(--mono);text-align:center;line-height:1.7}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">EURO FOOTBALL · 五大聯賽</div>
    <h1><svg class="sitelogo" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="#14283d"/><circle cx="32" cy="32" r="22" fill="none" stroke="#4ecac1" stroke-width="2.4"/><path d="M32 16 L40 22 L37 32 L27 32 L24 22 Z" fill="#4ecac1"/><rect x="19" y="45" width="8" height="4" rx="2" fill="#46c46a"/><rect x="28" y="45" width="8" height="4" rx="2" fill="#ffc247"/><rect x="37" y="45" width="8" height="4" rx="2" fill="#ef5f5f"/></svg>
      <span>歐洲足球 <span class="ball">每日預測</span></span></h1>
    <div class="eyebrow" style="text-transform:none;font-family:var(--mono);letter-spacing:0">
      <span id="lgName">美國職業足球大聯盟 MLS</span> · <span id="upd">—</span> · 台灣時間 · <span class="buildtag" id="buildTag"></span></div>
    <div class="leagues" id="leagueTabs"></div>
    <div class="datebar">
      <button class="nav" id="prevBtn">‹</button>
      <input type="date" id="datePick">
      <button class="nav" id="nextBtn">›</button>
      <button class="today-btn" id="todayBtn">今天</button>
      <button class="btn" id="loadBtn"><span class="ico">⟳</span> 更新</button>
    </div>
    <div class="score-row">
      <div class="stat"><div class="num" id="scPct">—</div><div class="lbl">勝負命中</div></div>
      <div class="stat"><div class="num small" id="scRec">0/0</div><div class="lbl">已驗證</div></div>
      <div class="stat"><div class="num small" id="scBrier">—</div><div class="lbl">Brier 校準</div></div>
      <div class="status" id="status"></div>
    </div>
  </header>

  <div class="searchbar" style="margin-top:18px">
    <input type="text" id="searchBox" placeholder="搜尋球員或球隊…例如 Haaland、姆巴佩、Arsenal">
  </div>
  <div class="filterbar" id="filterBar">
    <button class="fchip on" data-pos="">全部</button>
    <button class="fchip" data-pos="門將">門將</button>
    <button class="fchip" data-pos="後衛">後衛</button>
    <button class="fchip" data-pos="中場">中場</button>
    <button class="fchip" data-pos="前鋒">前鋒</button>
    <span class="fdiv"></span>
    <button class="fchip cross" id="crossBtn" data-cross="0">🌍 跨五大聯賽</button>
  </div>
  <div style="font-family:var(--mono);font-size:11.5px;color:var(--muted);margin:6px 0 4px" id="searchInfo"></div>
  <div class="search-results" id="searchResults"></div>

  <!-- 賽事 -->
  <section id="fixturesSec">
    <div class="sec-head"><h2>賽事預測</h2><span class="tag" id="fxTag"></span></div>
    <div id="games"></div>
  </section>

  <!-- 積分榜 -->
  <section id="standSec">
    <div class="sec-head"><h2>積分榜</h2><span class="tag" id="standTag"></span></div>
    <div id="standings"></div>
  </section>

  <!-- 頭條 -->
  <section id="hlSec">
    <div class="sec-head"><h2>頭條</h2></div>
    <div id="headlines"></div>
  </section>

  <!-- 球隊頁 -->
  <section id="teamView" class="hidden">
    <div class="sec-head"><h2 id="teamTitle"></h2><button class="back" id="backBtn">‹ 返回</button></div>
    <div id="roster"></div>
  </section>

  <footer>
    資料來源:ESPN 公開 API(免金鑰)· 預測為 Poisson 模型參考,非投注建議<br>
    球隊實力評級與球星名單為概估,將持續校準
  </footer>
</div>

/* ================= Poisson 預測 ================= */
function poisson(k,l){let e=Math.exp(-l),f=1;for(let i=2;i<=k;i++)f*=i;return e*Math.pow(l,k)/f;}
function predict(homeName,awayName){
  const rh=rating(homeName), ra=rating(awayName), d=rh-ra;
  const COEF=0.030, BASE=1.32, HA=0.24;         // 主場優勢固定(聯賽有真實主客場)
  let lh=BASE*Math.exp(COEF*d/2 + HA/2), la=BASE*Math.exp(-COEF*d/2 - HA/2);
  lh=Math.max(0.2,Math.min(lh,4.2)); la=Math.max(0.2,Math.min(la,4.2));
  let H=0,D=0,A=0;
  for(let i=0;i<8;i++)for(let j=0;j<8;j++){const p=poisson(i,lh)*poisson(j,la);
    if(i>j)H+=p;else if(i===j)D+=p;else A+=p;}
  const t=H+D+A; H=H/t*100;D=D/t*100;A=A/t*100;
  let si=Math.round(lh), sj=Math.round(la);
  if(la<0.75)sj=0; if(lh<0.75)si=0;
  if(H>=A&&si<=sj)si=sj+1; else if(A>H&&sj<=si)sj=si+1;
  if(Math.abs(H-A)<6){si=sj=Math.max(1,Math.round((lh+la)/2));}
  const conf = Math.max(H,D,A)>=55?"高":Math.max(H,D,A)>=42?"中":"低";
  const pick = H>=A ? homeName : awayName;
  return {H:+H.toFixed(1),D:+D.toFixed(1),A:+A.toFixed(1),si,sj,conf,pick};
}
function reasonText(hn,an,p){
  const hz=zhName(hn),az=zhName(an),gap=Math.abs(p.H-p.A);
  const fav=p.H>=p.A?hz:az, fp=Math.max(p.H,p.A);
  let s;
  if(gap>=28) s=`${fav}實力明顯領先(${fp}%),主客與陣容深度佔優。`;
  else if(gap>=12) s=`${fav}略占上風(${fp}%),但對手有一定抵抗力。`;
  else s=`勢均力敵,${fav}僅微幅領先(${fp}%),和局機率也有 ${p.D}%。`;
  return `（模型預測）${s}預期比分 ${p.si}-${p.sj}。實際仍需視當日先發、傷停與狀態調整。`;
}

async function jget(url){const r=await fetch(url);if(!r.ok)throw new Error("HTTP "+r.status);return r.json();}
function espnScore(league,date){return `https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/scoreboard?dates=${date}`;}
function espnStand(league){return `https://site.api.espn.com/apis/v2/sports/soccer/${league}/standings`;}
function espnTeams(league){return `https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/teams`;}
/* 足球名冊端點在 ESPN 有多種格式,逐一嘗試(哪個成功用哪個) */
function espnRosterUrls(league,teamId){return [
  `https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/teams/${teamId}/roster`,
  `https://site.api.espn.com/apis/site/v2/sports/soccer/${league}/teams/${teamId}?enable=roster`,
  `https://site.web.api.espn.com/apis/site/v2/sports/soccer/${league}/teams/${teamId}/roster`,
];}
function parseRosterPayload(rd){
  // 可能結構:rd.athletes[](分組) / rd.team.athletes[] / rd.roster.entries[]
  const flat=[];
  const push=a=>{ if(a&&(a.fullName||a.displayName)) flat.push(a); };
  const groups = rd.athletes || (rd.team&&rd.team.athletes) || (rd.roster&&(rd.roster.entries||rd.roster.athletes)) || [];
  (Array.isArray(groups)?groups:[groups]).forEach(g=>{
    if(!g) return;
    if(g.items||g.athletes){ (g.items||g.athletes).forEach(x=>push(x.athlete||x)); }
    else push(g.athlete||g);
  });
  return flat;
}
async function fetchTeamRoster(league,teamId){
  let lastErr=null;
  for(const u of espnRosterUrls(league,teamId)){
    try{ const rd=await jget(u); const flat=parseRosterPayload(rd); if(flat.length) return flat; }
    catch(e){ lastErr=e; }
  }
  if(lastErr) throw lastErr;
  return [];
}
function athleteToIdx(a,teamName,league){
  return { id:a.id, name:a.fullName||a.displayName,
    pos:(a.position&&(a.position.abbreviation||a.position.name))||"",
    num:a.jersey||"", teamName,
    headshot:(a.headshot&&(a.headshot.href||a.headshot))||"",
    age:a.age||"", nat:(a.citizenship)||(a.birthPlace&&a.birthPlace.country)||"",
    h:a.displayHeight||"", w:a.displayWeight||"", birth:(a.dateOfBirth||"").slice(0,10),
    league };
}
let TEAM_LIST={};   // league -> [{id,displayName}]
async function getTeamList(league){
  if(TEAM_LIST[league]) return TEAM_LIST[league];
  const td=await jget(espnTeams(league));
  let teams=[]; try{teams=td.sports[0].leagues[0].teams.map(t=>t.team);}catch(e){teams=(td.teams||[]).map(t=>t.team||t);}
  TEAM_LIST[league]=teams; return teams;
}

function posToZh(pos){
  const p=(pos||"").toLowerCase();
  if(p.includes("goal")||p==="g"||p==="gk")return"門將";
  if(p.includes("back")||p==="d"||p.includes("defen")||p.includes("full")||p.includes("centre-b"))return"後衛";
  if(p.includes("mid")||p==="m")return"中場";
  if(p.includes("forward")||p.includes("striker")||p.includes("wing")||p==="f"||p==="st"||p==="cf")return"前鋒";
  return"其他";
}

async function buildPlayerIndex(league){
  if(indexedLeague===league || indexLoading) return;
  indexLoading = true;
  const si = document.getElementById("searchInfo");
  if(si) si.textContent = "載入球員名冊中…";
  try{
    const teams = await getTeamList(league);
    const idx = [];
    const chunks = [];
    for(let i=0;i<teams.length;i+=4) chunks.push(teams.slice(i,i+4));
    let fail=0;
    for(const chunk of chunks){
      await Promise.all(chunk.map(async t=>{
        try{
          const flat = await fetchTeamRoster(league, t.id);
          flat.forEach(a=>idx.push(athleteToIdx(a, t.displayName, league)));
        }catch(e){ fail++; }
      }));
      if(si) si.textContent = `載入球員名冊中… ${idx.length} 名`;
    }
    PLAYER_INDEX = idx;
    indexedLeague = league;
    if(si) si.textContent = idx.length?`可搜尋 ${idx.length} 名球員${fail?`(${fail} 隊載入失敗)`:""}`
      :`名冊端點無資料(${fail} 隊失敗)— 點球隊仍可即時載入該隊名冊`;
  }catch(e){
    if(si) si.innerHTML = `名冊載入失敗:${e.message} · <a href="#" id="idxRetry" style="color:var(--teal)">重試</a>`;
    const r=document.getElementById("idxRetry");
    if(r) r.onclick=(ev)=>{ev.preventDefault();indexedLeague=null;indexLoading=false;buildPlayerIndex(league);};
  }
  indexLoading = false;
}

/* 跨五大聯賽:依序把每個聯賽的名冊都併進索引 */
async function buildAllLeaguesIndex(){
  if(allIndexLoaded) return;
  const si=document.getElementById("searchInfo");
  const merged=[]; const seen=new Set();
  for(const lg of LEAGUES){
    if(si) si.textContent=`載入 ${lg.zh} 名冊中…`;
    try{
      const teams=await getTeamList(lg.id);
      const chunks=[]; for(let i=0;i<teams.length;i+=4) chunks.push(teams.slice(i,i+4));
      for(const chunk of chunks){
        await Promise.all(chunk.map(async t=>{
          try{
            const flat=await fetchTeamRoster(lg.id,t.id);
            flat.forEach(a=>{
              const key=(a.fullName||a.displayName)+"|"+t.displayName; if(seen.has(key))return; seen.add(key);
              merged.push(athleteToIdx(a,t.displayName,lg.id));
            });
          }catch(e){}
        }));
      }
    }catch(e){}
  }
  PLAYER_INDEX=merged; allIndexLoaded=true; indexedLeague="ALL";
  if(si) si.textContent=`可搜尋五大聯賽 ${merged.length} 名球員`;
}

/* 由真實資料生成球員介紹(誠實原則:有什麼寫什麼,不編造) */
function playerIntroText(p,flat){
  const parts=[];
  const zhPos=posToZh(p.pos);
  parts.push(`${p.name} 是 ${zhName(p.teamName)} 的${zhPos}${p.num?`(背號 ${p.num})`:""}`);
  if(p.age||p.nat){ parts.push(`${p.nat?p.nat+"籍,":""}${p.age?`現年 ${p.age} 歲`:""}`.replace(/,$/,"")); }
  if(p.h||p.w){ parts.push(`${p.h||""}${p.h&&p.w?" / ":""}${p.w||""}`); }
  if(flat){
    const g=flat.goals??flat.totalGoals, a=flat.goalAssists??flat.assists, ap=flat.appearances;
    const sv=flat.saves, yc=flat.yellowCards;
    const bits=[];
    if(ap!=null) bits.push(`出場 ${ap} 次`);
    if(zhPos==="門將"&&sv!=null) bits.push(`撲救 ${sv} 次`);
    if(g!=null&&+g>0) bits.push(`攻入 ${g} 球`);
    if(a!=null&&+a>0) bits.push(`送出 ${a} 助攻`);
    if(bits.length) parts.push(`本季${bits.join("、")}`);
    if(g!=null&&+g>=10) parts.push(`是球隊的主要得分點`);
    else if(a!=null&&+a>=8) parts.push(`是進攻的重要串聯者`);
  }
  return parts.filter(Boolean).join(",")+"。資料來源:ESPN,介紹由數據自動生成。";
}
async function fetchPlayerStats(league, id){
  if(!id) return null;
  const tryUrls = [
    `https://site.web.api.espn.com/apis/common/v3/sports/soccer/${league}/athletes/${id}/overview`,
    `https://site.api.espn.com/apis/common/v3/sports/soccer/${league}/athletes/${id}/stats`,
  ];
  for(const u of tryUrls){
    try{
      const d = await jget(u);
      const flat = {};
      (function walk(o){
        if(!o||typeof o!=="object") return;
        if(Array.isArray(o)){ o.forEach(walk); return; }
        const key = o.name || o.abbreviation;
        const dv = o.displayValue!=null?o.displayValue:(o.value!=null?o.value:null);
        if(key && dv!=null && (typeof dv==="string"||typeof dv==="number")) { if(flat[key]==null) flat[key]=dv; }
        for(const k in o) walk(o[k]);
      })(d);
      if(Object.keys(flat).length) return flat;
    }catch(e){}
  }
  return null;
}

  // 非同步抓數據
  fetchPlayerStats(p.league||curLeague, p.id).then(flat=>{
    const load=document.getElementById("statLoad"), box=document.getElementById("playerStats");
    if(!load||!box) return;  // 使用者已離開此頁
    if(!flat){ load.textContent="ESPN 未提供此球員的數據"; box.innerHTML=`<div class="empty" style="text-align:left">此球員暫無公開賽季數據(可能為新援、青年球員或該季未出場)。</div>`; return; }
    const picked = Object.keys(STAT_ZH).filter(k=>flat[k]!=null)
      .map(k=>[STAT_ZH[k], flat[k]])
      .filter(([l,v],i,arr)=>arr.findIndex(x=>x[0]===l)===i);  // 去重(進球/助攻同義)
    if(!picked.length){ load.textContent="ESPN 未提供結構化數據"; box.innerHTML=`<div class="empty" style="text-align:left">找到球員但無可解析的數據欄位。</div>`; return; }
    load.textContent="來源:ESPN";
    const intro=document.getElementById("playerIntro");
    if(intro) intro.innerHTML=`<span class="k">介紹</span>${playerIntroText(p,flat)}`;
    box.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">`+
      picked.map(([l,v])=>`<div style="border:1px solid var(--line);border-radius:9px;background:var(--panel);padding:10px 13px;text-align:center">
        <div style="font-family:var(--mono);font-weight:600;font-size:22px;color:var(--amber)">${v}</div>
        <div style="font-family:var(--cond);letter-spacing:.08em;text-transform:uppercase;font-size:11px;color:var(--muted);margin-top:2px">${l}</div></div>`).join("")+`</div>`;
  });
}

function parseEvents(data){
  const out=[];
  (data.events||[]).forEach(ev=>{
    const c=(ev.competitions||[])[0]; if(!c)return;
    const cs=c.competitors||[];
    const home=cs.find(x=>x.homeAway==="home"), away=cs.find(x=>x.homeAway==="away");
    if(!home||!away)return;
    const st=(c.status||ev.status||{}).type||{};
    out.push({
      id:ev.id,
      hn:home.team.displayName, an:away.team.displayName,
      hlogo:home.team.logo||"", alogo:away.team.logo||"",
      hs:home.score!=null?parseInt(home.score):null, as:away.score!=null?parseInt(away.score):null,
      state:st.state||"pre",             // pre / in / post
      completed:!!st.completed,
      time:new Date(ev.date).toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false}),
      detail:st.shortDetail||"",
    });
  });
  return out;
}

/* ================= 記分卡(localStorage,含防呆) ================= */
function scGet(){
  try{const v=localStorage.getItem("euroSC");return v?JSON.parse(v):{};}catch(e){return inMemScorecard;}
}
function scSet(o){
  inMemScorecard=o;
  try{localStorage.setItem("euroSC",JSON.stringify(o));}catch(e){}
}
function gradeFinished(games){
  const sc=scGet(); let changed=false;
  games.forEach(g=>{
    if(!g.completed||g.hs==null||g.as==null)return;
    if(sc[g.id])return;
    const p=predict(g.hn,g.an);
    const realOut = g.hs>g.as?"H":g.hs<g.as?"A":"D";
    const predOut = p.H>=p.D&&p.H>=p.A?"H":p.A>=p.D&&p.A>=p.H?"A":"D";
    const y={H:0,D:0,A:0}; y[realOut]=1;
    const brier=(p.H/100-y.H)**2+(p.D/100-y.D)**2+(p.A/100-y.A)**2;
    sc[g.id]={hit:predOut===realOut, brier:+brier.toFixed(3),
      score:predOut===realOut&&p.si===g.hs&&p.sj===g.as};
    changed=true;
  });
  if(changed)scSet(sc);
  return sc;
}
function renderScorecard(){
  const sc=scGet(); const ids=Object.keys(sc);
  const n=ids.length, hit=ids.filter(k=>sc[k].hit).length;
  const brier=n?ids.reduce((s,k)=>s+sc[k].brier,0)/n:0;
  document.getElementById("scPct").textContent=n?Math.round(hit/n*100)+"%":"—";
  document.getElementById("scRec").textContent=hit+"/"+n;
  document.getElementById("scBrier").textContent=n?brier.toFixed(2):"—";
}

/* ================= 渲染 ================= */
function probBar(p){
  return `<div class="prob"><div class="prob-bar">
      <div class="h" style="width:${p.H}%"></div><div class="d" style="width:${p.D}%"></div><div class="a" style="width:${p.A}%"></div></div>
    <div class="prob-lbl"><span>主勝 <b>${p.H}%</b></span><span>和 <b>${p.D}%</b></span><span>客勝 <b>${p.A}%</b></span></div></div>`;
}
function teamRow(name,logo,score,win,pred){
  const zh=zhName(name), en=zh!==name?`<span style="color:var(--muted);font-size:12px">${name}</span>`:"";
  const logoImg=logo?`<img src="${logo}" alt="" onerror="this.style.visibility='hidden'">`:`<span style="width:26px"></span>`;
  const sc = score!=null?`<span class="sc">${score}</span>`:(pred!=null?`<span class="sc" style="color:var(--teal)">${pred}</span>`:"");
  return `<div class="team ${win?'win':''}">${logoImg}<span class="nm" data-team="${name}">${zh} ${en}</span>${sc}</div>`;
}
function gameCard(g){
  const p=predict(g.hn,g.an);
  const done=g.completed, live=g.state==="in";
  let pill;
  if(live) pill=`<span class="pill live"><span class="dot"></span>${g.detail||'進行中'}</span>`;
  else if(done){
    const realOut=g.hs>g.as?"H":g.hs<g.as?"A":"D";
    const predOut=p.H>=p.D&&p.H>=p.A?"H":p.A>=p.D&&p.A>=p.H?"A":"D";
    pill=realOut===predOut?`<span class="pill hit">命中</span>`:`<span class="pill miss">未中</span>`;
  } else pill=`<span class="pill wait">未開賽</span>`;

  const hWin=done&&g.hs>g.as, aWin=done&&g.as>g.hs;
  const rows=`<div class="teams">
    ${teamRow(g.hn,g.hlogo,done?g.hs:null,hWin,done?null:p.si)}
    ${teamRow(g.an,g.alogo,done?g.as:null,aWin,done?null:p.sj)}</div>`;

  let body="";
  if(done){
    body=`<div class="predline"><span class="k">賽前預測</span> 看好 <span class="pick">${zhName(p.pick)}</span> · 比分 <b>${p.si}-${p.sj}</b> · 信心 ${p.conf}</div>
      <div class="why"><span class="k">結果</span>${g.hs}-${g.as},實際 ${g.hs>g.as?zhName(g.hn):g.hs<g.as?zhName(g.an):'雙方戰平'}${g.hs===g.as?'':'勝出'}。</div>`;
  }else{
    body=probBar(p)+`<div class="predline"><span class="k">預測</span>看好 <span class="pick">${zhName(p.pick)}</span> · 比分 <b>${p.si}-${p.sj}</b> · 信心 ${p.conf}</div>
      <div class="why"><span class="k">理由</span>${reasonText(g.hn,g.an,p)}</div>`;
  }
  return `<div class="game ${done?'done':''}"><div class="g-top"><span class="g-time">${g.time}</span>${pill}</div>${rows}${body}</div>`;
}

function renderGames(games){
  const box=document.getElementById("games");
  document.getElementById("fxTag").textContent=`${games.length} 場`;
  if(!games.length){ box.innerHTML=`<div class="empty">這天沒有${LEAGUES.find(l=>l.id===curLeague).zh}賽事。<br>歐洲聯賽賽季約 8 月至隔年 5 月,休賽期無比賽——用上方日期切換到有賽事的日子。</div>`; return; }
  games.sort((a,b)=>a.time.localeCompare(b.time));
  box.innerHTML=games.map(gameCard).join("");
  box.querySelectorAll(".nm[data-team]").forEach(el=>el.onclick=()=>showTeam(el.dataset.team));
}

function renderStandings(data){
  const box=document.getElementById("standings"), tag=document.getElementById("standTag");
  const val=(e,name)=>{const s=(e.stats||[]).find(x=>x.name===name||x.type===name);return s?(s.displayValue??s.value):"";};
  const groups=[];
  try{
    (data.children||[data]).forEach(gr=>{
      const entries=(gr.standings?.entries||gr.entries||[]);
      if(entries.length) groups.push({name:gr.name||gr.abbreviation||"", entries});
    });
  }catch(e){}
  const total=groups.reduce((s,g)=>s+g.entries.length,0);
  if(!total){ box.innerHTML=`<div class="empty">積分榜暫無資料(可能為休賽期或新賽季尚未開始)。</div>`; tag.textContent=""; return; }
  const confZh=n=>{const s=(n||"").toLowerCase();
    if(s.includes("east"))return"東區"; if(s.includes("west"))return"西區"; return n||"";};
  let html="";
  groups.forEach(g=>{
    const rows=g.entries.map((e,i)=>{
      const t=e.team||{}, nm=t.displayName||t.name||"";
      const rank=val(e,"rank")||i+1;
      const gp=val(e,"gamesPlayed"), w=val(e,"wins"), d=val(e,"ties")||val(e,"draws"), l=val(e,"losses");
      const gf=val(e,"pointsFor"), ga=val(e,"pointsAgainst"), gd=val(e,"pointDifferential"), pts=val(e,"points");
      STAND_CACHE[norm(nm)]={rank,gp,w,d,l,gf,ga,gd,pts,logo:(t.logos&&t.logos[0]&&t.logos[0].href)||""};
      const cls = i<4?"ucl":(groups.length===1&&i>=g.entries.length-3?"rel":"");
      const logo=t.logos&&t.logos[0]?`<img src="${t.logos[0].href}" onerror="this.style.display='none'">`:"";
      return `<tr class="${cls}"><td>${rank}</td><td data-team="${nm}">${logo}${zhName(nm)}</td>
        <td>${gp}</td><td>${w}</td><td>${d}</td><td>${l}</td><td>${gf}</td><td>${ga}</td><td>${gd}</td><td>${pts}</td></tr>`;
    }).join("");
    const head=groups.length>1?`<div class="pos-group" style="margin:14px 0 8px">${confZh(g.name)}</div>`:"";
    html+=head+`<div class="table-wrap"><table class="stand">
      <thead><tr><th>#</th><th>球隊</th><th>賽</th><th>勝</th><th>和</th><th>負</th><th>進</th><th>失</th><th>±</th><th>分</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  });
  box.innerHTML=html;
  tag.textContent=`${total} 隊${groups.length>1?" · "+groups.map(g=>confZh(g.name)).join("/"):""}`;
  box.querySelectorAll("td[data-team]").forEach(el=>el.onclick=()=>showTeam(el.dataset.team));
}

function renderHeadlines(games){
  const box=document.getElementById("headlines");
  const done=games.filter(g=>g.completed);
  if(!done.length){ box.innerHTML=`<div class="empty" style="text-align:left">尚無完賽頭條。有賽果後自動生成。</div>`; return; }
  const items=done.slice(0,5).map(g=>{
    const p=predict(g.hn,g.an);
    const winner=g.hs>g.as?zhName(g.hn):g.hs<g.as?zhName(g.an):null;
    const margin=Math.abs(g.hs-g.as);
    const upset=winner && ((winner===zhName(g.hn)&&p.H<30)||(winner===zhName(g.an)&&p.A<30));
    let k,t;
    if(!winner){k="平局";t=`${zhName(g.hn)} ${g.hs}-${g.as} ${zhName(g.an)},握手言和`;}
    else if(upset){k="爆冷";t=`爆冷!${winner} 擊敗對手,${g.hs}-${g.as}`;}
    else if(margin>=3){k="大勝";t=`${winner} ${Math.max(g.hs,g.as)}-${Math.min(g.hs,g.as)} 大勝`;}
    else{k="賽果";t=`${zhName(g.hn)} ${g.hs}-${g.as} ${zhName(g.an)}`;}
    return `<div class="headline"><span class="hk">${k}</span>${t}</div>`;
  }).join("");
  box.innerHTML=items;
}

async function showTeam(name){
  document.getElementById("teamView").classList.remove("hidden");
  ["fixturesSec","standSec","hlSec"].forEach(id=>document.getElementById(id).classList.add("hidden"));
  document.getElementById("teamTitle").textContent=zhName(name);
  const box=document.getElementById("roster");
  window.scrollTo(0,0);

  // 球隊賽季數據橫幅(從積分榜快取)
  const s=STAND_CACHE[norm(name)];
  let banner="";
  if(s){
    const cells=[["排名","#"+s.rank],["賽",s.gp],["勝",s.w],["和",s.d],["負",s.l],["進",s.gf],["失",s.ga],["淨",s.gd],["積分",s.pts]];
    banner=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:7px;margin-bottom:16px">`+
      cells.map(([l,v])=>`<div style="border:1px solid var(--line);border-radius:9px;background:var(--panel);padding:9px 6px;text-align:center">
        <div style="font-family:var(--mono);font-weight:600;font-size:19px;color:${l==='積分'?'var(--amber)':'var(--chalk)'}">${v!==""&&v!=null?v:'—'}</div>
        <div style="font-family:var(--cond);letter-spacing:.06em;text-transform:uppercase;font-size:10.5px;color:var(--muted)">${l}</div></div>`).join("")+`</div>`;
  }
  box.dataset.banner = banner;
  // 先從已載入的球員索引找出整隊(即時、真實名冊)
  const roster = PLAYER_INDEX.filter(p=>norm(p.teamName)===norm(name));
  if(roster.length){
    const byPos = {"前鋒":[],"中場":[],"後衛":[],"門將":[],"其他":[]};
    const posZh = pos=>{const p=(pos||"").toLowerCase();
      if(p.includes("forward")||p==="f"||p.includes("striker")||p.includes("wing"))return"前鋒";
      if(p.includes("mid")||p==="m")return"中場";
      if(p.includes("back")||p==="d"||p.includes("defen"))return"後衛";
      if(p.includes("goal")||p==="g"||p==="gk")return"門將";return"其他";};
    roster.forEach(p=>byPos[posZh(p.pos)].push(p));
    let html="";
    ["前鋒","中場","後衛","門將","其他"].forEach(grp=>{
      if(!byPos[grp].length)return;
      html+=`<div class="pos-group">${grp}</div>`;
      html+=byPos[grp].map(p=>{
        const av=p.headshot?`<img class="avatar" style="object-fit:cover" src="${p.headshot}" data-init="${(p.name||'?').charAt(0)}" onerror="avFallback(this)">`:`<div class="avatar">${(p.name||'?').charAt(0)}</div>`;
        const star=starsFor(name)&&starsFor(name).some(s=>p.name.includes(s[0].split(" ").pop()))?`<span class="badge star">⭐</span>`:"";
        return `<div class="player" data-player='${encodeURIComponent(JSON.stringify(p))}' style="cursor:pointer">${av}
          <div><div class="p-top"><span class="pnm">${p.name}</span>${star}<span class="pmeta">${p.pos}${p.num?' · #'+p.num:''}</span></div>
          ${p.nat?`<div class="p-note">${p.nat}</div>`:""}</div></div>`;
      }).join("");
    });
    box.innerHTML=(box.dataset.banner||"")+html;
    box.querySelectorAll(".player[data-player]").forEach(el=>el.onclick=()=>showPlayer(JSON.parse(decodeURIComponent(el.dataset.player))));
    return;
  }

  // 索引沒涵蓋這隊 → 即時抓該隊名冊(不再只顯示空頁)
  box.innerHTML = `<div class="empty">正在載入 ${zhName(name)} 的名冊…</div>`;
  (async()=>{
    try{
      // 在六個聯賽中找這支球隊的 id
      let found=null, foundLg=null;
      for(const lg of LEAGUES){
        try{
          const teams=await getTeamList(lg.id);
          const t=teams.find(x=>norm(x.displayName)===norm(name)||norm(x.displayName).includes(norm(name))||norm(name).includes(norm(x.displayName)));
          if(t){found=t;foundLg=lg.id;break;}
        }catch(e){}
      }
      if(!found) throw new Error("找不到球隊");
      const flat=await fetchTeamRoster(foundLg,found.id);
      if(!flat.length) throw new Error("名冊無資料");
      const players=flat.map(a=>athleteToIdx(a,found.displayName,foundLg));
      players.forEach(p=>{ if(!PLAYER_INDEX.some(x=>x.id===p.id&&x.teamName===p.teamName)) PLAYER_INDEX.push(p); });
      showTeam(name);   // 重進:此時索引已有,走完整名冊路徑
    }catch(e){
      const stars=starsFor(name);
      let fb = stars? `<div class="pos-group">代表球星</div>`+stars.map(([n,pos,note])=>
        `<div class="player"><div class="avatar">${n.charAt(0)}</div><div>
          <div class="p-top"><span class="pnm">${n}</span><span class="badge star">⭐ ${pos}</span></div>
          <div class="p-note">${note}</div></div></div>`).join("") : "";
      box.innerHTML = (box.dataset.banner||"") + fb +
        `<div class="empty">${zhName(name)} 名冊載入失敗(${e.message})。<br>可能是 ESPN 端點暫時無回應,稍後點「更新」重試。</div>`;
    }
  })();
}
function hideTeam(){
  document.getElementById("teamView").classList.add("hidden");
  ["fixturesSec","standSec","hlSec"].forEach(id=>document.getElementById(id).classList.remove("hidden"));
}

/* ================= 載入 ================= */
async function load(){
  const btn=document.getElementById("loadBtn"), st=document.getElementById("status");
  btn.classList.add("spin"); btn.disabled=true; st.className="status"; st.textContent="載入中…";
  hideTeam();
  const dateStr=ymd(curDate);
  document.getElementById("upd").textContent=isoDate(curDate)+" "+new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false});
  try{
    const data=await jget(espnScore(curLeague,dateStr));
    const games=parseEvents(data);
    gradeFinished(games);
    renderScorecard();
    renderGames(games);
    renderHeadlines(games);
    st.textContent=`已更新 · ${games.length} 場`;
  }catch(e){
    document.getElementById("games").innerHTML=`<div class="empty">無法載入賽事資料。<br>可能是網路、跨域限制或該聯賽代碼異常。稍後再試或切換聯賽。<br><span style="color:var(--miss)">${e.message}</span></div>`;
    st.className="status err"; st.textContent="載入失敗";
  }
  // standings(獨立,失敗不影響賽事)
  try{
    const sd=await jget(espnStand(curLeague));
    renderStandings(sd);
  }catch(e){
    document.getElementById("standings").innerHTML=`<div class="empty">積分榜暫時無法載入(休賽期或來源限制)。</div>`;
  }
  btn.classList.remove("spin"); btn.disabled=false;
}

/* ================= 初始化 ================= */
function buildLeagueTabs(){
  const box=document.getElementById("leagueTabs");
  box.innerHTML=LEAGUES.map(l=>`<button class="lg ${l.id===curLeague?'on':''}" data-lg="${l.id}">${l.zh}</button>`).join("");
  box.querySelectorAll(".lg").forEach(el=>el.onclick=()=>{
    curLeague=el.dataset.lg;
    document.querySelectorAll(".lg").forEach(x=>x.classList.toggle("on",x.dataset.lg===curLeague));
    const lg=LEAGUES.find(l=>l.id===curLeague);
    document.getElementById("lgName").textContent=lg.full;
    STAND_CACHE={};                                   // 清掉上一聯賽的戰績快取
    document.getElementById("searchResults").innerHTML="";
    if(!crossLeague){                                 // 非跨聯賽模式 → 重建該聯賽球員索引
      indexedLeague=null; PLAYER_INDEX=[]; allIndexLoaded=false;
      buildPlayerIndex(curLeague);
    }
    document.getElementById("searchResults").innerHTML="";
    load();
    buildPlayerIndex(curLeague);
  });
}
function init(){
  document.getElementById("buildTag").textContent="build "+BUILD;
  buildLeagueTabs();
  const dp=document.getElementById("datePick");
  dp.value=isoDate(curDate);
  dp.onchange=()=>{const [y,m,d]=dp.value.split("-").map(Number);curDate=new Date(y,m-1,d);load();};
  document.getElementById("prevBtn").onclick=()=>{curDate.setDate(curDate.getDate()-1);dp.value=isoDate(curDate);load();};
  document.getElementById("nextBtn").onclick=()=>{curDate.setDate(curDate.getDate()+1);dp.value=isoDate(curDate);load();};
  document.getElementById("todayBtn").onclick=()=>{curDate=new Date();dp.value=isoDate(curDate);load();};
  document.getElementById("loadBtn").onclick=load;
  document.getElementById("backBtn").onclick=hideTeam;
  const sb=document.getElementById("searchBox");
  let sTimer=null;
  sb.addEventListener("input",e=>{ clearTimeout(sTimer); sTimer=setTimeout(()=>searchPlayers(e.target.value),180); });
  // 位置篩選 chip
  document.querySelectorAll(".fchip[data-pos]").forEach(el=>el.onclick=()=>{
    curPos=el.dataset.pos;
    document.querySelectorAll(".fchip[data-pos]").forEach(x=>x.classList.toggle("on",x===el));
    searchPlayers(sb.value);
  });
  // 跨五大聯賽 toggle
  document.getElementById("crossBtn").onclick=async()=>{
    const btn=document.getElementById("crossBtn");
    crossLeague=!crossLeague; btn.classList.toggle("on",crossLeague);
    if(crossLeague){ await buildAllLeaguesIndex(); }
    else{ allIndexLoaded=false; indexedLeague=null; PLAYER_INDEX=[]; buildPlayerIndex(curLeague); }
    searchPlayers(sb.value);
  };
  load();
  buildPlayerIndex(curLeague);
  setInterval(()=>{ if(!document.hidden) load(); }, 90000);  // 每 90 秒自動更新
}
init();
</script>
