# .github/workflows/daily.yml
# 世界盃「全自動」流水線 —— 免 API 金鑰(ESPN 公開資料)
#   1) update_matches 抓完賽結果       → results.js
#   2) review_engine  自動檢討+校準評級  → reviews.js / ratings.json
#   3) injury_engine  抓傷兵/停賽+算折扣  → injuries.js / adjust.json
#   4) predict_engine 自動預測(用校準評級+傷停折扣) → predictions.js
#   5) news_engine    自動頭條           → headlines.js
# 順序:先校準與傷停,預測才吃得到最新狀況。
name: 世界盃全自動更新

on:
  schedule:
    - cron: "*/15 * * * *"     # 每 15 分鐘(UTC)。想更即時可改 "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wc-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 1) 抓最新比分
        run: python update_matches.py --source espn --out results.js
      - name: 2) 自動檢討 + 校準評級
        run: python review_engine.py
      - name: 3) 抓傷兵/停賽 + 算戰力折扣
        run: python injury_engine.py
      - name: 4) 自動預測(吃校準評級+傷停折扣)
        run: python predict_engine.py --out predictions.js
      - name: 5) 自動頭條
        run: python news_engine.py

      - name: 提交所有變動
        run: |
          FILES="results.js results_state.json reviews.js ratings.json reviewed_state.json \
                 injuries.js adjust.json predictions.js predictions_log.json headlines.js"
          if [[ -n "$(git status --porcelain $FILES)" ]]; then
            git config user.name  "wc-bot"
            git config user.email "wc-bot@users.noreply.github.com"
            git add $FILES
            git commit -m "全自動更新 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase --autostash origin main || true
            git push
          else
            echo "無變動,略過。"
          fi
